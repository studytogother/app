<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WORD SLUGGER - LEGO TRANSLUCENT EDITION</title>
    <style>
        :root {
            /* 用 RGBA 定義半透明色彩 */
            --bg-field: rgba(96, 163, 188, 0.9); --grass: rgba(120, 224, 143, 0.8); --dirt: rgba(230, 126, 34, 0.7); --ui-navy: rgba(10, 61, 98, 0.95);
            --lego-yellow: rgba(254, 202, 87, 0.9); --neon-blue: rgba(0, 210, 211, 0.95); --strike-red: rgba(255, 107, 107, 0.9);
            --white: #ffffff;
        }

        * { box-sizing: border-box; touch-action: manipulation; font-family: 'Segoe UI', Arial, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background: #0a3d62; overflow: hidden; color: var(--white); }

        #game-container { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* --- 頂部計分板 (向量幾何風) --- */
        header { 
            height: 80px; background: rgba(0,0,0,0.5); display: flex; justify-content: space-around; 
            align-items: center; border-bottom: 4px solid var(--neon-blue); z-index: 10;
        }
        .stat-box { text-align: center; border: 1px solid rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 8px; }
        .stat-label { font-size: 10px; color: var(--neon-blue); font-weight: bold; letter-spacing: 1px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--white); }
        .strike-dot { display: inline-block; width: 14px; height: 14px; border: 2px solid #555; border-radius: 50%; margin: 0 3px; transition: 0.3s; }
        .strike-active { background: var(--strike-red); border-color: var(--white); box-shadow: 0 0 8px var(--strike-red); }

        /* --- 向量球場舞台 --- */
        #stage { flex: 1; position: relative; background: var(--bg-field); overflow: hidden; }
        .field-svg { width: 100%; height: 100%; }

        /* 樂高人物與打擊動畫 */
        #batter-group { transition: transform 0.1s; transform-origin: 50% 80%; fill-opacity: 0.9; }
        .bat-svg { transition: transform 0.1s; transform-origin: 42px 65px; fill-opacity: 0.9; }
        .swinging .bat-svg { transform: rotate(100deg); }

        /* 壘包指示器 */
        .base-indicator { position: absolute; top: 10px; right: 10px; width: 70px; height: 70px; fill-opacity: 0.8; }

        /* --- 題目區 --- */
        #ui-area { background: var(--ui-navy); padding: 20px; border-top-left-radius: 20px; border-top-right-radius: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .meaning-hint { color: var(--lego-yellow); font-size: 1.2rem; margin-bottom: 12px; font-weight: bold; text-align: center; }
        .word-display { text-align: center; margin-bottom: 20px; letter-spacing: 5px; }
        .letter-slot { 
            display: inline-block; width: 32px; height: 45px; border-bottom: 4px solid var(--white); 
            margin: 0 5px; font-size: 28px; font-weight: bold; text-transform: uppercase; line-height: 45px;
        }

        /* 樂高風格鍵盤 */
        .keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; max-width: 600px; margin: 0 auto; }
        .key { 
            background: rgba(75, 101, 132, 0.9); border: none; border-radius: 6px; color: white; height: 48px; 
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.1s;
            box-shadow: 0 4px 0 rgba(47, 53, 66, 0.9);
        }
        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(47, 53, 66, 0.9); }
        .key.correct { background: rgba(32, 191, 107, 0.95); box-shadow: 0 4px 0 rgba(16, 172, 132, 0.95); }
        .key.wrong { background: var(--strike-red); opacity: 0.4; }

        /* 掃描球 (Scan Ball) */
        #scan-btn { 
            width: 100%; margin-top: 15px; padding: 12px; background: var(--neon-blue); 
            border: none; border-radius: 10px; color: white; font-weight: 900; letter-spacing: 2px;
            cursor: pointer; box-shadow: 0 4px 0 rgba(10, 189, 227, 0.9); fill-opacity: 0.95;
        }

        /* 效果文字 */
        #announcer { 
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 4rem; font-weight: 900; color: var(--lego-yellow); 
            text-shadow: 4px 4px 0 var(--ui-navy); z-index: 100; pointer-events: none; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .show-announcement { transform: translate(-50%, -50%) scale(1.2) !important; opacity: 1; }

        /* --- 學習畫面 --- */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--ui-navy); }
        .study-list { width: 90%; max-width: 500px; flex: 1; overflow-y: auto; padding: 20px; }
        .study-card { background: rgba(255,255,255,0.05); border-left: 5px solid var(--lego-yellow); padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        .btn-start { padding: 15px 60px; font-size: 1.5rem; background: var(--lego-yellow); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 20px; color: var(--ui-navy); fill-opacity: 0.95; }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="stat-box"><div class="stat-label">SCORE</div><div class="stat-value" id="score">0</div></div>
        <div class="stat-box"><div class="stat-label">QUEST</div><div class="stat-value" id="q-idx">1/10</div></div>
        <div class="stat-box">
            <div class="stat-label">STRIKES</div>
            <div id="strike-container"><span class="strike-dot"></span><span class="strike-dot"></span><span class="strike-dot"></span></div>
        </div>
    </header>

    <div id="stage">
        <svg class="field-svg" viewBox="0 0 400 400">
            <rect width="400" height="400" fill="var(--bg-field)" />
            <path d="M0 250 L400 250 L400 400 L0 400 Z" fill="var(--grass)" /> <path d="M200 250 L400 400 L0 400 Z" fill="rgba(230, 126, 34, 0.3)" /> <circle cx="200" cy="270" r="40" fill="rgba(207, 106, 23, 0.6)" /> <g transform="translate(192, 240) scale(0.4)" fill-opacity="0.8">
                <rect x="0" y="20" width="40" height="45" rx="5" fill="#eb4d4b" /> <rect x="7" y="0" width="26" height="20" rx="8" fill="#feca57" /> <path d="M7 10 Q7 0 20 0 Q33 0 33 10 Z" fill="#eb4d4b" />
                <rect x="33" y="7" width="10" height="3" fill="#eb4d4b" rx="1.5" />
            </g>

            <path d="M185 370 L215 370 L220 385 L200 395 L180 385 Z" fill="rgba(255,255,255,0.8)" />

            <g id="batter-group" transform="translate(160, 300)" fill-opacity="0.9">
                <rect x="30" y="45" width="40" height="50" rx="5" fill="#4b6584" />
                <rect x="38" y="20" width="24" height="25" rx="8" fill="#feca57" />
                <path d="M38 25 Q38 15 50 15 Q62 15 62 25 Z" fill="#2f3542" />
                <rect x="62" y="22" width="12" height="4" fill="#2f3542" rx="2" />
                <g class="bat-svg">
                    <rect x="38" y="-10" width="8" height="75" rx="4" fill="#d35400" />
                </g>
            </g>

            <circle id="v-ball" cx="200" cy="260" r="5" fill="rgba(255,255,255,0.9)" style="display:none; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));" />
        </svg>

        <svg class="base-indicator" viewBox="0 0 100 100">
            <rect x="45" y="5" width="10" height="10" transform="rotate(45 50 10)" fill="rgba(51,51,51,0.5)" id="ind-2" />
            <rect x="85" y="45" width="10" height="10" transform="rotate(45 90 50)" fill="rgba(51,51,51,0.5)" id="ind-1" />
            <rect x="5" y="45" width="10" height="10" transform="rotate(45 10 50)" fill="rgba(51,51,51,0.5)" id="ind-3" />
        </svg>

        <div id="announcer">HOMERUN</div>
    </div>

    <div id="ui-area">
        <div class="meaning-hint" id="hint">準備開始</div>
        <div class="word-display" id="display"></div>
        <div class="keyboard" id="kb"></div>
        <button id="scan-btn">SCAN BALL (剩餘 1)</button>
    </div>

    <div id="study-screen" class="screen" style="display:flex;">
        <h2 style="color:var(--lego-yellow)">📋 賽前暖身錄</h2>
        <div class="study-list" id="s-list"></div>
        <div id="timer" style="font-size:2rem; margin:10px; font-weight:bold;">10:00</div>
        <button class="btn-start" onclick="startGame()">進入球場</button>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="r-title" style="color:var(--lego-yellow); font-size:3rem;">FINISH</h1>
        <p id="r-msg" style="font-size:1.5rem"></p>
        <button class="btn-start" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
// --- 核心邏輯 ---
const wordBank = [
    {word: "STRATEGY", meaning: "策略"}, {word: "CHAMPION", meaning: "冠軍"},
    {word: "EFFICIENT", meaning: "有效率的"}, {word: "BRILLIANT", meaning: "傑出的"},
    {word: "POTENTIAL", meaning: "潛力"}, {word: "DYNAMIC", meaning: "充滿活力的"},
    {word: "FOCUS", meaning: "焦點"}, {word: "VICTORY", meaning: "勝利"},
    {word: "DEDICATED", meaning: "奉獻的"}, {word: "AMBITIOUS", meaning: "有抱負的"}
];

let session = []; let curIdx = 0; let strikes = 0; let score = 0; let combo = 0;
let onBase = [false, false, false]; // 1, 2, 3
let currentWord = ""; let guessed = new Set();
let cheats = 1;

function init() {
    session = wordBank.sort(() => 0.5 - Math.random()).slice(0, 10);
    document.getElementById('s-list').innerHTML = session.map(w => `
        <div class="study-card"><strong>${w.word}</strong><br>${w.meaning}</div>
    `).join('');
    
    let time = 600;
    const tInterval = setInterval(() => {
        time--;
        let m = Math.floor(time/60); let s = time%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        if(time <= 0) startGame();
    }, 1000);
    window.tInterval = tInterval;
}

function startGame() {
    clearInterval(window.tInterval);
    document.getElementById('study-screen').style.display = 'none';
    loadWord();
}

function loadWord() {
    if(curIdx >= 10) { end(true); return; }
    currentWord = session[curIdx].word.toUpperCase();
    guessed.clear();
    document.getElementById('q-idx').innerText = `${curIdx+1}/10`;
    document.getElementById('hint').innerText = session[curIdx].meaning;
    render();
}

function render() {
    const disp = document.getElementById('display');
    disp.innerHTML = currentWord.split('').map(l => `<span class="letter-slot">${guessed.has(l)?l:''}</span>`).join('');
    
    const kb = document.getElementById('kb');
    const letters = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');
    kb.innerHTML = letters.map(l => `<button class="key" id="k-${l}" onclick="guess('${l}')">${l}</button>`).join('');
}

function guess(l) {
    if(guessed.has(l)) return;
    const btn = document.getElementById(`k-${l}`);
    if(currentWord.includes(l)) {
        guessed.add(l); btn.classList.add('correct');
        render();
        if(currentWord.split('').every(char => guessed.has(char))) winStep();
    } else {
        btn.classList.add('wrong');
        strikeStep();
    }
}

function strikeStep() {
    strikes++; combo = 0;
    const dots = document.querySelectorAll('.strike-dot');
    if(strikes <= 3) dots[strikes-1].classList.add('strike-active');
    
    // 揮棒空振動畫
    document.getElementById('batter-group').classList.add('swinging');
    setTimeout(()=>document.getElementById('batter-group').classList.remove('swinging'), 200);

    if(strikes >= 3) setTimeout(()=>end(false), 500);
}

function winStep() {
    combo++; curIdx++;
    // 打擊動作
    const batter = document.getElementById('batter-group');
    const ball = document.getElementById('v-ball');
    batter.classList.add('swinging');
    
    // 球飛出動畫 (修正)
    ball.style.display = 'block';
    // 雖然 CSS 定義了，但這裡用 JS animate 控制路徑更準確，且能顯示球飛出去
    ball.animate([
        { cx: 200, cy: 375, r: 8, fillOpacity: 1 }, // 起點在本壘板
        { cx: Math.random()*400, cy: -50, r: 2, fillOpacity: 0.1 } // 飛向遠方外野
    ], { duration: 800, fill: 'forwards', easing: 'ease-out' });

    setTimeout(() => {
        batter.classList.remove('swinging');
        ball.style.display = 'none';
        
        // 判定規則
        if(curIdx === 10) { announce("GRAND SLAM!", 4); onBase=[false,false,false]; }
        else if(combo === 4) { announce("HOMERUN!", 4); combo=0; onBase=[false,false,false]; }
        else { announce("HIT!", 0); onBase[combo-1] = true; }
        
        updateBases();
        setTimeout(loadWord, 1500);
    }, 800);
}

function updateBases() {
    // 這裡也加入透明色判斷
    document.getElementById('ind-1').setAttribute('fill', onBase[0]?'rgba(254, 202, 87, 0.9)':'rgba(51,51,51,0.5)');
    document.getElementById('ind-2').setAttribute('fill', onBase[1]?'rgba(254, 202, 87, 0.9)':'rgba(51,51,51,0.5)');
    document.getElementById('ind-3').setAttribute('fill', onBase[2]?'rgba(254, 202, 87, 0.9)':'rgba(51,51,51,0.5)');
}

function announce(txt, pts) {
    const el = document.getElementById('announcer');
    el.innerText = txt;
    el.classList.add('show-announcement');
    if(pts > 0) { 
        let runners = onBase.filter(b=>b).length + 1;
        score += runners;
        document.getElementById('score').innerText = score;
    }
    setTimeout(()=>el.classList.remove('show-announcement'), 1200);
}

document.getElementById('scan-btn').onclick = () => {
    if(cheats <= 0) return;
    cheats--;
    document.getElementById('scan-btn').innerText = `SCAN BALL (剩餘 0)`;
    const slots = document.querySelectorAll('.letter-slot');
    currentWord.split('').forEach((l, i) => {
        slots[i].innerText = l;
        slots[i].style.color = 'var(--neon-blue)';
    });
    setTimeout(() => {
        currentWord.split('').forEach((l, i) => {
            if(!guessed.has(l)) slots[i].innerText = '';
            slots[i].style.color = 'white';
        });
    }, 1200);
};

function end(win) {
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('r-title').innerText = win ? "勝利投球！" : "被三振了！";
    document.getElementById('r-msg').innerText = `最終擊出得分：${score}`;
}

init();
</script>
</body>
</html>

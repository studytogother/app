<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>化生單字測驗 - 般若學習系統</title>
    <script src="question_bank.js?v=9"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #58504A;
            --accent-gold: #CBA37A;
            --accent-jade: #82968C;
            --accent-rose: #CFA4A4;
            --cloud-top: #E1F5FE;
            --cloud-bottom: #B3E5FC;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        header { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.4); z-index: 100; }
        .back-btn { font-weight: bold; color: var(--accent-jade); background: var(--glass-bg); padding: 8px 18px; border-radius: 20px; border: 1px solid white; cursor: pointer; }

        /* 選關畫面 */
        #level-select-screen { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .grid-container { width: 100%; max-width: 500px; display: grid; gap: 12px; }
        .group-btn { background: var(--glass-bg); padding: 22px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }

        /* 測驗舞台 */
        #test-screen { flex: 1; display: none; flex-direction: column; align-items: center; position: relative; width: 100%; overflow: hidden; }
        .spirit-stage { height: 320px; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; }
        
        #spirit-wrapper { width: 280px; height: 320px; position: relative; display: flex; justify-content: center; align-items: center; cursor: pointer;}
        #cloud-svg { width: 100%; height: 100%; transition: 0.5s; animation: float 4s infinite ease-in-out; transform-origin: center bottom; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(1deg); } }
        
        /* 金色大手：神聖強擄 */
        #divine-hand { position: absolute; top: -350px; left: 50%; transform: translateX(-50%); width: 150px; transition: 0.7s cubic-bezier(0.17, 0.67, 0.83, 0.67); z-index: 20; pointer-events: none; }
        .hand-grab { top: 10px !important; } 
        .hand-yank { transition: 1s cubic-bezier(0.6, 0.04, 0.98, 0.34) !important; transform: translate(-50%, -1500px) !important; }

        /* 泥水融化效果 */
        .melt { animation: meltAnim 1.5s forwards ease-in !important; }
        @keyframes meltAnim { 
            0% { transform: scaleY(1) scaleX(1); opacity: 1; } 
            100% { transform: scaleY(0.04) scaleX(3) translateY(600px); opacity: 0.8; } 
        }
        .condense { animation: condenseAnim 0.8s forwards ease-out; }
        @keyframes condenseAnim { 0% { opacity: 0; transform: scale(0.2); } 100% { opacity: 1; transform: scale(1); } }

        .part { opacity: 0; transition: 0.4s; } .visible { opacity: 1 !important; }

        /* 單字欄位 */
        .word-test-area { margin-bottom: 20px; text-align: center; width: 100%; }
        .letter-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 15px;}
        .letter-dash { width: 36px; height: 48px; border-bottom: 4px solid var(--accent-gold); font-size: 1.9rem; font-weight: bold; display: flex; align-items: flex-end; justify-content: center; color: var(--text-main); }
        .letter-dash.error-reveal { color: var(--accent-rose); border-bottom-color: var(--accent-rose); }

        /* 果凍大鍵盤 */
        .keyboard-container { width: 100%; background: rgba(255,255,255,0.4); padding: 12px 8px env(safe-area-inset-bottom); border-top-left-radius: 25px; border-top-right-radius: 25px; }
        .kb-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .key { flex: 1; max-width: 48px; height: 58px; background: #fff; border: none; border-radius: 12px; font-size: 1.4rem; font-weight: bold; box-shadow: 0 4px 0 #D1D9E6; cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center; }
        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 #D1D9E6; }
        .key.correct { background: var(--accent-jade); color: white; box-shadow: 0 4px 0 #6A7D74; pointer-events: none; }
        .key.wrong { background: var(--accent-rose); color: white; box-shadow: 0 4px 0 #A57C7C; opacity: 0.5; pointer-events: none; }

        .wisdom-eye-btn { position: absolute; top: 15px; right: 20px; background: var(--glass-bg); border: 2px solid var(--accent-gold); color: var(--accent-gold); padding: 8px 16px; border-radius: 20px; font-weight: bold; z-index: 50; }
        #tap-to-continue { position: absolute; top: 50%; color: var(--accent-rose); font-weight: bold; display: none; z-index: 60; background: white; padding: 10px 20px; border-radius: 20px; border: 2px solid var(--accent-rose); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<header>
    <div class="back-btn" onclick="location.reload()">返回</div>
    <div id="header-title" style="font-weight:bold;">妙依修煉場</div>
    <div class="timer-badge" id="global-timer"></div>
</header>

<div id="level-select-screen">
    <div class="grid-container" id="senior-grid"></div>
</div>

<div id="absorb-screen" style="display:none; padding:20px; flex-direction:column; align-items:center;">
    <div id="word-list-container" style="width:100%; max-width:500px; background:white; border-radius:20px; padding:20px;"></div>
    <button class="vajra-btn" style="width:90%; max-width:320px; padding:20px; background:var(--accent-gold); color:white; border-radius:25px; border:none; margin:20px; font-weight:bold; font-size:1.2rem;" onclick="startTest()">開始修煉</button>
</div>

<div id="test-screen">
    <button class="wisdom-eye-btn" onclick="useCheatEye()">慧眼</button>
    <div id="tap-to-continue" onclick="loadWordTest()">化生失敗，點擊泥水重凝</div>

    <div class="spirit-stage">
        <svg id="divine-hand" viewBox="0 0 100 150">
            <path d="M20,0 L20,80 Q20,100 40,100 L60,100 Q80,100 80,80 L80,0" fill="none" stroke="#FFD700" stroke-width="6" stroke-linecap="round"/>
            <path d="M30,100 Q30,130 50,140 Q70,130 70,100" fill="none" stroke="#FFD700" stroke-width="8" stroke-linecap="round"/>
            <circle cx="50" cy="118" r="6" fill="#FFD700" opacity="0.8"/>
        </svg>

        <div id="spirit-wrapper" onclick="handlePuddleClick()">
            <svg id="cloud-svg" viewBox="0 0 200 240">
                <defs>
                    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--cloud-top);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--cloud-bottom);stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path id="s-body" class="part" fill="url(#cloudGrad)" d="M50,130 Q30,130 30,110 Q30,80 60,80 Q60,50 100,50 Q140,50 140,80 Q170,80 170,110 Q170,130 150,130 Z" stroke="#90A4AE" stroke-width="2.5" />
                <g id="s-head" class="part">
                    <line x1="80" y1="95" x2="100" y2="95" stroke="#333" stroke-width="4" stroke-linecap="round" />
                    <line x1="110" y1="95" x2="130" y2="95" stroke="#333" stroke-width="4" stroke-linecap="round" />
                    <path id="s-mouth" d="M95 112 Q105 108 115 112" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round" />
                </g>
                <g id="s-legs" class="part">
                    <line x1="85" y1="130" x2="85" y2="210" stroke="#90A4AE" stroke-width="5" stroke-linecap="round" />
                    <line x1="125" y1="130" x2="125" y2="210" stroke="#90A4AE" stroke-width="5" stroke-linecap="round" />
                </g>
            </svg>
        </div>
    </div>
    
    <div class="word-test-area">
        <div class="letter-row" id="letter-row"></div>
    </div>
    <div class="keyboard-container" id="keyboard"></div>
</div>

<script>
if (typeof QuestionBank === 'undefined') { window.QuestionBank = { senior: [{title: "智慧修煉", words: [{word:"PEACE", meaning:"和平"}]}] }; }

let currentWords = []; let testIndex = 0; let mistakes = 0; 
let guessedLetters = new Set(); let correctCount = 0; let usedCheat = false;
let isMelted = false;

// 失敗次數設定 (妳可以改成 1 或 3)
const MAX_MISTAKES = 3; 

function initLevelSelect() {
    const grid = document.getElementById('senior-grid');
    grid.innerHTML = (QuestionBank.senior || []).map(g => `
        <div class="group-btn" onclick="selectGroup('${g.title}')"><b>${g.title}</b><span>修煉</span></div>
    `).join('');
}

function selectGroup(title) {
    const group = QuestionBank.senior.find(g => g.title === title);
    currentWords = group.words;
    document.getElementById('level-select-screen').style.display = 'none';
    document.getElementById('absorb-screen').style.display = 'flex';
    document.getElementById('word-list-container').innerHTML = currentWords.map(w => `<div style="padding:15px; border-bottom:1px solid #eee;"><b>${w.word}</b> - ${w.meaning}</div>`).join('');
}

function startTest() {
    document.getElementById('absorb-screen').style.display = 'none';
    document.getElementById('test-screen').style.display = 'flex';
    testIndex = 0; correctCount = 0; loadWordTest();
}

function loadWordTest() {
    if (testIndex >= currentWords.length) { alert("修煉圓滿，升空數：" + correctCount); location.reload(); return; }
    guessedLetters.clear(); mistakes = 0; usedCheat = false; isMelted = false;
    
    const wrapper = document.getElementById('spirit-wrapper');
    const cloud = document.getElementById('cloud-svg');
    const hand = document.getElementById('divine-hand');
    const tip = document.getElementById('tap-to-continue');
    
    wrapper.className = "condense"; 
    cloud.classList.remove('melt');
    hand.classList.remove('hand-grab', 'hand-yank');
    tip.style.display = 'none';
    document.querySelectorAll('.part').forEach(p => p.classList.remove('visible'));
    
    document.getElementById('letter-row').innerHTML = currentWords[testIndex].word.split('').map(() => `<div class="letter-dash"></div>`).join('');
    initKeyboard();
    setTimeout(() => { wrapper.classList.remove('condense'); playCurrentWordAudio(); }, 800);
}

function handleGuess(letter, btn) {
    if(isMelted) return;
    const word = currentWords[testIndex].word.toUpperCase();
    const cloud = document.getElementById('cloud-svg');
    
    if (word.includes(letter)) {
        guessedLetters.add(letter); btn.classList.add('correct');
        updateDashes(); updateSpirit();
        cloud.style.transform = "scale(1.15)";
        setTimeout(() => cloud.style.transform = "scale(1)", 150);
        if (word.split('').every(l => guessedLetters.has(l))) {
            if(!usedCheat) correctCount++; triggerWin();
        }
    } else {
        mistakes++; btn.classList.add('wrong');
        cloud.style.transform = "translateX(15px) rotate(5deg)";
        setTimeout(() => cloud.style.transform = "translateX(0) rotate(0deg)", 200);
        if (mistakes >= MAX_MISTAKES) revealFailure(); 
    }
}

function updateDashes() {
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((char, i) => { if (guessedLetters.has(char)) dashes[i].innerText = char; });
}

function updateSpirit() {
    const p = guessedLetters.size / new Set(currentWords[testIndex].word.toUpperCase().split('')).size;
    if (p > 0) document.getElementById('s-body').classList.add('visible');
    if (p > 0.4) document.getElementById('s-head').classList.add('visible');
    if (p > 0.8) document.getElementById('s-legs').classList.add('visible');
}

function triggerWin() {
    document.getElementById('keyboard').style.pointerEvents = 'none';
    const hand = document.getElementById('divine-hand');
    const wrapper = document.getElementById('spirit-wrapper');
    setTimeout(() => {
        hand.classList.add('hand-grab');
        setTimeout(() => {
            hand.classList.add('hand-yank');
            wrapper.classList.add('hand-yank');
            playCurrentWordAudio();
            setTimeout(() => { testIndex++; loadWordTest(); }, 1600);
        }, 700);
    }, 300);
}

function revealFailure() {
    isMelted = true;
    document.getElementById('keyboard').style.pointerEvents = 'none';
    document.getElementById('cloud-svg').classList.add('melt');
    document.getElementById('tap-to-continue').style.display = 'block';
    
    // 顯示紅色正確答案
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((char, i) => { 
        if (!guessedLetters.has(char)) { dashes[i].innerText = char; dashes[i].classList.add('error-reveal'); }
    });
}

function handlePuddleClick() { if(isMelted) { testIndex++; loadWordTest(); } }

function useCheatEye() {
    if(usedCheat) return; usedCheat = true;
    const overlay = document.getElementById('cheat-overlay');
    overlay.innerText = currentWords[testIndex].word.toUpperCase();
    overlay.style.display = 'block';
    setTimeout(() => { overlay.style.display = 'none'; }, 900);
}

function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; m.rate = 0.8; window.speechSynthesis.speak(m); }
function playCurrentWordAudio() { speak(currentWords[testIndex].word); }

function initKeyboard() {
    const kb = document.getElementById('keyboard');
    const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
    kb.innerHTML = rows.map(row => `<div class="kb-row">${row.split('').map(l => `<button class="key" onclick="handleGuess('${l}', this)">${l}</button>`).join('')}</div>`).join('');
    kb.style.pointerEvents = 'auto';
}

window.onload = initLevelSelect;
</script>
</body>
</html>

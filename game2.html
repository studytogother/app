<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>化生單字測驗 - 般若學習系統</title>
    <script src="question_bank.js?v=7"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A;
            --accent-gold: #CBA37A;
            --accent-jade: #82968C;
            --accent-rose: #CFA4A4;
            /* 雲朵插畫色 */
            --cloud-top: #E1F5FE;
            --cloud-bottom: #B3E5FC;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        header { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); background: rgba(255,255,255,0.4); z-index: 100; }
        .timer-badge { font-weight: bold; color: var(--accent-gold); font-size: 1.1rem; }
        .back-btn { display: flex; align-items: center; gap: 6px; color: var(--accent-jade); font-size: 0.95rem; background: var(--glass-bg); padding: 8px 18px; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; font-weight: bold; }

        /* --- 階段：選關畫面 --- */
        #level-select-screen { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .section-title { width: 100%; max-width: 500px; font-size: 1.1rem; color: var(--accent-jade); border-bottom: 2px solid rgba(130, 150, 140, 0.2); padding-bottom: 8px; margin: 20px 0 10px; font-weight: bold; }
        .grid-container { width: 100%; max-width: 500px; display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        .group-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 22px 20px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        /* --- 階段：定心吸收 --- */
        #absorb-screen { flex: 1; padding: 20px; overflow-y: auto; display: none; flex-direction: column; align-items: center; }
        .word-list-card { width: 100%; max-width: 500px; background: var(--glass-bg); border-radius: 20px; padding: 10px 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .absorb-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(203,163,122,0.15); }
        
        /* --- 階段：測驗畫面 --- */
        #test-screen { flex: 1; display: none; flex-direction: column; align-items: center; position: relative; width: 100%; overflow: hidden; }
        .spirit-stage { height: 320px; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; }
        
        /* 雲朵大尺寸與動畫 */
        #spirit-container { width: 280px; height: 320px; transition: 0.5s; z-index: 5; animation: float 4s infinite ease-in-out; transform-origin: center bottom; position: relative; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(1deg); } }
        
        .part { opacity: 0; transition: 0.4s; } .visible { opacity: 1 !important; }

        /* 金色大手動畫 */
        #divine-hand { position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 120px; height: 200px; transition: 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 10; pointer-events: none; }
        .hand-descend { top: 40px !important; }
        .yank-up { transition: 1s cubic-bezier(0.4, 0, 1, 1) !important; transform: translate(-50%, -1200px) !important; }

        /* 融化與凝聚 */
        .condense { animation: condenseAnim 0.8s forwards ease-out; }
        @keyframes condenseAnim { 0% { opacity: 0; transform: scale(0.2); } 100% { opacity: 1; transform: scale(1); } }
        .melt { animation: meltAnim 1.6s forwards ease-in; }
        @keyframes meltAnim { 0% { transform: scaleY(1) scaleX(1); opacity: 1; } 100% { transform: scaleY(0.05) scaleX(2.5) translateY(400px); opacity: 0; } }

        /* 單字區 */
        .word-test-area { margin-bottom: 20px; text-align: center; flex-shrink: 0; width: 100%; }
        .letter-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 15px;}
        .letter-dash { width: 36px; height: 48px; border-bottom: 4px solid var(--accent-gold); font-size: 1.9rem; font-weight: bold; display: flex; align-items: flex-end; justify-content: center; color: var(--text-main); }
        .letter-dash.error-reveal { color: var(--accent-rose); border-bottom-color: var(--accent-rose); }

        /* 三排大鍵盤 */
        .keyboard-container { width: 100%; background: rgba(255,255,255,0.4); padding: 12px 8px env(safe-area-inset-bottom); border-top-left-radius: 25px; border-top-right-radius: 25px; }
        .kb-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .key { flex: 1; max-width: 46px; height: 56px; background: #fff; border: none; border-radius: 12px; font-size: 1.3rem; font-weight: bold; box-shadow: 0 4px 0 #D1D9E6; cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center; }
        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 #D1D9E6; }
        .key.correct { background: var(--accent-jade); color: white; box-shadow: 0 4px 0 #6A7D74; pointer-events: none; }
        .key.wrong { background: var(--accent-rose); color: white; box-shadow: 0 4px 0 #A57C7C; opacity: 0.5; pointer-events: none; }

        .wisdom-eye-btn { position: absolute; top: 15px; right: 20px; background: var(--glass-bg); border: 2px solid var(--accent-gold); color: var(--accent-gold); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; font-weight: bold; z-index: 20; }
        #cheat-overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: var(--accent-gold); padding: 15px 35px; border-radius: 20px; font-size: 2.6rem; font-weight: bold; z-index: 50; display: none; letter-spacing: 5px; }
        .vajra-btn { width: 90%; max-width: 320px; padding: 20px; background: var(--accent-gold); color: white; border: none; border-radius: 25px; font-size: 1.2rem; font-weight: bold; margin: 20px 0; box-shadow: 0 6px 0 #A68563; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="back-btn" onclick="goBackOrExit()">返回</div>
    <div id="header-title" style="font-weight:bold;">修煉場</div>
    <div class="timer-badge" id="global-timer"></div>
</header>

<div id="level-select-screen">
    <div class="section-title">高中 7000 單字修煉</div>
    <div class="grid-container" id="senior-grid"></div>
    <div class="section-title">托福高階無礙</div>
    <div class="grid-container" id="toefl-grid"></div>
</div>

<div id="absorb-screen">
    <div class="word-list-card" id="word-list-container"></div>
    <button class="vajra-btn" onclick="startTest()">開始天籟盲測</button>
</div>

<div id="test-screen">
    <button class="wisdom-eye-btn" onclick="useCheatEye()">慧眼</button>
    <div id="cheat-overlay"></div>

    <svg id="divine-hand" viewBox="0 0 100 150">
        <path d="M20,0 L20,80 Q20,100 40,100 L60,100 Q80,100 80,80 L80,0" fill="none" stroke="var(--accent-gold)" stroke-width="4" stroke-linecap="round"/>
        <path d="M30,100 Q30,130 50,135 Q70,130 70,100" fill="none" stroke="var(--accent-gold)" stroke-width="6" stroke-linecap="round"/>
        <circle cx="50" cy="115" r="5" fill="var(--accent-gold)" opacity="0.6"/>
    </svg>

    <div class="spirit-stage" id="spirit-stage">
        <div id="spirit-container">
            <svg width="100%" height="100%" viewBox="0 0 200 240" onclick="playCurrentWordAudio()">
                <defs>
                    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:var(--cloud-top);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:var(--cloud-bottom);stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path id="s-body" class="part" fill="url(#cloudGrad)" d="M50,130 Q30,130 30,110 Q30,80 60,80 Q60,50 100,50 Q140,50 140,80 Q170,80 170,110 Q170,130 150,130 Z" stroke="#90A4AE" stroke-width="2.5" />
                <g id="s-head" class="part">
                    <line x1="80" y1="95" x2="100" y2="95" stroke="#333" stroke-width="4" stroke-linecap="round" />
                    <line x1="110" y1="95" x2="130" y2="95" stroke="#333" stroke-width="4" stroke-linecap="round" />
                    <path d="M95 112 Q105 108 115 112" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round" />
                </g>
                <g id="s-legs" class="part">
                    <line x1="85" y1="130" x2="85" y2="210" stroke="#90A4AE" stroke-width="5" stroke-linecap="round" />
                    <line x1="125" y1="130" x2="125" y2="210" stroke="#90A4AE" stroke-width="5" stroke-linecap="round" />
                </g>
            </svg>
        </div>
    </div>
    
    <div class="word-test-area">
        <div class="letter-row" id="letter-row"></div>
    </div>
    <div class="keyboard-container" id="keyboard"></div>
</div>

<div id="result-screen" style="display:none; text-align:center; padding: 50px 20px;">
    <h1 style="color:var(--accent-jade);">修煉圓滿</h1>
    <div id="result-desc" style="font-size:1.3rem; margin-bottom:30px;"></div>
    <button class="vajra-btn" onclick="location.reload()">返回大廳</button>
</div>

<script>
// 單字庫安全檢查
if (typeof QuestionBank === 'undefined') {
    window.QuestionBank = { senior: [{title: "基礎修煉", words: [{word:"WISDOM", meaning:"智慧"}]}], toefl: [] };
}

let currentWords = []; let currentStep = -1; let testIndex = 0; 
let mistakes = 0; let guessedLetters = new Set(); let correctCount = 0; let usedCheat = false;
let globalTimerInterval;

function initLevelSelect() {
    currentStep = -1;
    function renderGrid(containerId, category) {
        const grid = document.getElementById(containerId); if(!grid) return;
        grid.innerHTML = (QuestionBank[category] || []).map(group => `
            <div class="group-btn" onclick="selectGroup('${category}', '${group.title}')">
                <span class="g-title">${group.title}</span><span class="g-status">任務</span>
            </div>
        `).join('');
    }
    renderGrid('senior-grid', 'senior'); renderGrid('toefl-grid', 'toefl');
}

function selectGroup(cat, title) {
    const group = QuestionBank[cat].find(g => g.title === title);
    currentWords = group.words; initAbsorb();
}

function goBackOrExit() { location.reload(); }

function initAbsorb() {
    currentStep = 0;
    document.getElementById('level-select-screen').style.display = 'none';
    document.getElementById('absorb-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "定心吸收";
    document.getElementById('word-list-container').innerHTML = currentWords.map(w => `
        <div class="absorb-item">
            <div><b>${w.word}</b><br><small>${w.meaning}</small></div>
            <button class="audio-btn" onclick="speak('${w.word}')">聽</button>
        </div>
    `).join('');
}

function startTest() {
    currentStep = 1; document.getElementById('absorb-screen').style.display = 'none';
    document.getElementById('test-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "天籟盲測";
    testIndex = 0; correctCount = 0; loadWordTest();
}

function loadWordTest() {
    if (testIndex >= currentWords.length) { showFinalResult(); return; }
    guessedLetters.clear(); mistakes = 0; usedCheat = false;
    
    const container = document.getElementById('spirit-container');
    const hand = document.getElementById('divine-hand');
    container.className = "condense"; hand.className = "";
    document.querySelectorAll('.part').forEach(p => p.classList.remove('visible'));
    
    document.getElementById('letter-row').innerHTML = currentWords[testIndex].word.split('').map(() => `<div class="letter-dash"></div>`).join('');
    initKeyboard();
    setTimeout(() => { container.classList.remove('condense'); playCurrentWordAudio(); }, 800);
}

function handleGuess(letter, btn) {
    const word = currentWords[testIndex].word.toUpperCase();
    const container = document.getElementById('spirit-container');
    if (word.includes(letter)) {
        guessedLetters.add(letter); btn.classList.add('correct');
        updateDashes(); updateSpirit();
        container.style.transform = "scale(1.15)";
        setTimeout(() => container.style.transform = "scale(1)", 150);
        if (word.split('').every(l => guessedLetters.has(l))) {
            if(!usedCheat) correctCount++; triggerWin();
        }
    } else {
        mistakes++; btn.classList.add('wrong');
        container.style.transform = "translateX(15px) rotate(5deg)";
        setTimeout(() => container.style.transform = "translateX(0) rotate(0deg)", 200);
        if (mistakes >= 3) revealAnswer(); // 改為 3 次失敗
    }
}

function updateDashes() {
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((char, i) => { if (guessedLetters.has(char)) dashes[i].innerText = char; });
}

function updateSpirit() {
    const p = guessedLetters.size / new Set(currentWords[testIndex].word.toUpperCase().split('')).size;
    if (p > 0) document.getElementById('s-body').classList.add('visible');
    if (p > 0.4) document.getElementById('s-head').classList.add('visible');
    if (p > 0.8) document.getElementById('s-legs').classList.add('visible');
}

function triggerWin() {
    document.getElementById('keyboard').style.pointerEvents = 'none';
    const hand = document.getElementById('divine-hand');
    const container = document.getElementById('spirit-container');
    
    // 大手降下抓走
    hand.classList.add('hand-descend');
    setTimeout(() => {
        hand.classList.add('yank-up');
        container.classList.add('yank-up');
        playCurrentWordAudio();
        setTimeout(() => { testIndex++; loadWordTest(); }, 1600);
    }, 800);
}

function revealAnswer() {
    document.getElementById('keyboard').style.pointerEvents = 'none';
    const container = document.getElementById('spirit-container');
    container.classList.add('melt');
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((char, i) => { 
        if (!guessedLetters.has(char)) { dashes[i].innerText = char; dashes[i].classList.add('error-reveal'); }
    });
    setTimeout(() => { testIndex++; loadWordTest(); }, 2000);
}

function useCheatEye() {
    if(usedCheat) return; usedCheat = true;
    const overlay = document.getElementById('cheat-overlay');
    overlay.innerText = currentWords[testIndex].word.toUpperCase();
    overlay.style.display = 'block';
    setTimeout(() => { overlay.style.display = 'none'; }, 900);
}

function showFinalResult() {
    document.getElementById('test-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('result-desc').innerHTML = `成功化生升空：<b>${correctCount}</b> / ${currentWords.length}`;
}

function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; m.rate = 0.8; window.speechSynthesis.speak(m); }
function playCurrentWordAudio() { speak(currentWords[testIndex].word); }

function initKeyboard() {
    const kb = document.getElementById('keyboard');
    const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
    kb.innerHTML = rows.map(row => `<div class="kb-row">${row.split('').map(l => `<button class="key" onclick="handleGuess('${l}', this)">${l}</button>`).join('')}</div>`).join('');
    kb.style.pointerEvents = 'auto';
}

window.onload = initLevelSelect;
</script>
</body>
</html>

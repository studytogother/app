<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智見邏輯 ． 因果實測</title>
    <script src="https://cdn.jsdelivr.net/npm/noble-hashes@1.3.1/sha256.js"></script>
    <style>
        :root {
            --bg-deep: #020205; 
            --gold: #f3e5ab; 
            --solid-gold: #d4af37; 
            --cyan: #8ba89c; 
            --text-main: #d0d0d0;
            --text-light: #968E86;
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.8);
        }
        
        body { 
            margin: 0; padding: 20px; background: var(--bg-deep); color: var(--text-main); 
            font-family: -apple-system, "PingFang TC", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* --- 承襲妙依美學 CSS --- */
        .gold-divider {
            width: 100%; height: 1px; margin: 25px 0;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
        }

        .section-header {
            color: var(--gold); font-size: 1.1rem; letter-spacing: 3px;
            margin-bottom: 20px; font-weight: bold; width: 100%;
            border-bottom: 1px solid rgba(212,175,55,0.3); padding-bottom: 12px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* 金剛大數據按鈕 */
        .vajra-wide-entrance { 
            width: 100%; margin-top: 15px; padding: 22px; 
            background: linear-gradient(135deg, rgba(15,15,15,0.9), rgba(193, 165, 131, 0.1)); 
            border: 1px solid rgba(193, 165, 131, 0.3); border-radius: 24px; 
            cursor: pointer; position: relative; overflow: hidden; transition: all 0.4s ease; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: center; 
        }
        .vajra-inner { display: flex; align-items: center; gap: 15px; position: relative; z-index: 2; }
        .vajra-text-group { display: flex; flex-direction: column; text-align: left; gap: 2px; }
        .vajra-main-title { font-size: 1.05rem; font-weight: 500; letter-spacing: 4px; color: var(--gold); }
        .vajra-sub-title { font-size: 0.75rem; color: var(--text-light); letter-spacing: 1px; }

        /* 呼吸與掃光 */
        @keyframes vajra-breathe { 
            0%, 100% { box-shadow: 0 10px 30px rgba(193, 165, 131, 0.1); border-color: rgba(193, 165, 131, 0.2); } 
            50% { box-shadow: 0 10px 40px rgba(193, 165, 131, 0.3); border-color: rgba(193, 165, 131, 0.6); } 
        }
        .vajra-glow-effect { animation: vajra-breathe 4s infinite ease-in-out; }
        
        .vajra-light-sweep { 
            position: absolute; top: 0; left: -150%; width: 60%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent); 
            transform: skewX(-25deg); z-index: 1; animation: sweep 6s infinite ease-in-out; 
        }
        @keyframes sweep { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        /* 實測互動區卡片 */
        .lab-card {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }

        input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(139,168,156,0.3);
            border-radius: 12px; padding: 12px; color: var(--cyan); font-size: 1rem; margin-bottom: 15px;
            outline: none; text-align: center;
        }

        .hash-display {
            font-family: monospace; font-size: 0.75rem; word-break: break-all;
            color: var(--cyan); background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
            border-left: 3px solid var(--cyan);
        }

        .mining-status { font-size: 0.8rem; color: var(--solid-gold); margin-top: 10px; letter-spacing: 1px; }

        /* 向量幣面容器 */
        #coin-preview {
            width: 120px; height: 120px; margin: 20px auto;
            display: flex; justify-content: center; align-items: center;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.3));
        }

    </style>
</head>
<body>

    <div class="section-header">
        <svg style="width:22px; height:22px;" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5">
            <polygon points="12 2 22 8 22 16 12 22 2 16 2 8" fill="rgba(243,229,171,0.05)"/><circle cx="12" cy="12" r="2.5" fill="var(--gold)"/>
        </svg>
        智見實驗室 ． 因果實測
    </div>

    <div class="lab-card">
        <div class="vajra-sub-title" style="margin-bottom:10px;">第一部：雜湊之鏡 (SHA-256)</div>
        <input type="text" id="hash-input" placeholder="輸入文字，照見數位指紋..." oninput="updateHash()">
        <div class="hash-display" id="hash-output">e3b0c44298fc1c149afbf4c8996fb...</div>
        <div class="vajra-sub-title" style="font-size:0.65rem; margin-top:8px;">※ 數據之尊嚴：差之毫釐，謬以千里。</div>
    </div>

    <div class="gold-divider"></div>

    <div class="lab-card">
        <div class="vajra-sub-title" style="margin-bottom:10px;">第二部：算力實測 (Proof of Work)</div>
        <div id="mining-area">
            <div class="vajra-wide-entrance vajra-glow-effect" onclick="startMining()">
                <div class="vajra-light-sweep"></div>
                <div class="vajra-inner">
                    <svg class="vajra-svg" viewBox="0 0 24 24" stroke="currentColor" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <div class="vajra-text-group">
                        <span class="vajra-main-title" id="mine-btn-text">啟動記帳</span>
                        <span class="vajra-sub-title">消耗算力，尋找真實 Nonce</span>
                    </div>
                </div>
            </div>
            <div class="mining-status" id="mining-info">等待指令...</div>
        </div>
    </div>

    <div class="gold-divider"></div>

    <div class="lab-card" style="text-align: center;">
        <div class="vajra-sub-title" style="margin-bottom:10px;">第三部：自性之幣 (Private Sovereign)</div>
        <div id="coin-preview">
            <svg viewBox="0 0 100 100" width="100" height="100"><circle cx="50" cy="50" r="40" stroke="#d4af37" stroke-width="1" fill="none" opacity="0.3"/></svg>
        </div>
        <button class="vajra-wide-entrance" onclick="mintCoin()" style="background: rgba(139,168,156,0.1); border-color: var(--cyan);">
            <div class="vajra-inner">
                <div class="vajra-text-group">
                    <span class="vajra-main-title" style="color:var(--cyan)">鑄造入藏</span>
                    <span class="vajra-sub-title">生成唯一私鑰並鎖入金剛藏</span>
                </div>
            </div>
        </button>
        <div id="vault-status" class="vajra-sub-title" style="margin-top:15px; font-size:0.7rem;"></div>
    </div>

    <div class="footer-text" style="text-align: center; font-size: 0.7rem; color: var(--text-light); margin-top: 30px;">
        智不傳私利之人 ． 永遠 99 分
    </div>

    <script>
        // --- 核心邏輯 ---

        // 1. 雜湊運算
        async function updateHash() {
            const input = document.getElementById('hash-input').value;
            const msgUint8 = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            document.getElementById('hash-output').innerText = hashHex;
            return hashHex;
        }

        // 2. 算力實測 (PoW)
        let mining = false;
        async function startMining() {
            if(mining) return;
            mining = true;
            const btnText = document.getElementById('mine-btn-text');
            const info = document.getElementById('mining-info');
            btnText.innerText = "運算中...";
            
            let nonce = 0;
            const target = "00"; // 難度：開頭兩個零
            const startTime = Date.now();

            async function mineLoop() {
                for(let i=0; i<500; i++) { // 每次循環跑 500 次，避免阻塞 UI
                    nonce++;
                    const data = "Prajna" + nonce;
                    const msgUint8 = new TextEncoder().encode(data);
                    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                    
                    if(hashHex.startsWith(target)) {
                        const duration = ((Date.now() - startTime)/1000).toFixed(2);
                        info.innerHTML = `成功！<br>Nonce: ${nonce}<br>耗時: ${duration}s<br>Hash: ${hashHex.substring(0,20)}...`;
                        btnText.innerText = "記帳完成";
                        mining = false;
                        return;
                    }
                }
                if(mining) {
                    info.innerText = `正在尋找 Nonce: ${nonce}`;
                    requestAnimationFrame(mineLoop);
                }
            }
            mineLoop();
        }

        // 3. 鑄造自性幣 (SVG 生成)
        async function mintCoin() {
            const hash = await updateHash();
            const coinPreview = document.getElementById('coin-preview');
            const vaultStatus = document.getElementById('vault-status');
            
            // 模擬私鑰地址生成 (簡化版)
            const address = "0x" + hash.substring(0, 10) + "..." + hash.substring(58, 64);
            
            // 動態生成向量圖形 (基於 Hash 參數)
            const petals = parseInt(hash.substring(0, 1), 16) % 8 + 5; 
            let svgContent = `<svg viewBox="0 0 100 100" width="100" height="100">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#f3e5ab;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="45" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" />`;
            
            for(let i=0; i<petals; i++) {
                const angle = (i / petals) * Math.PI * 2;
                const x2 = 50 + Math.cos(angle) * 35;
                const y2 = 50 + Math.sin(angle) * 35;
                svgContent += `<line x1="50" y1="50" x2="${x2}" y2="${y2}" stroke="url(#goldGrad)" stroke-width="0.5" />`;
                svgContent += `<circle cx="${x2}" cy="${y2}" r="3" fill="#fff" opacity="0.6" />`;
            }
            
            svgContent += `<circle cx="50" cy="50" r="5" fill="#fff" />
            </svg>`;
            
            coinPreview.innerHTML = svgContent;
            vaultStatus.innerHTML = `已存入本地金剛藏<br>地址: ${address}<br>狀態: 已簽署 (ECDSA)`;
            
            // 存入 LocalStorage
            localStorage.setItem('PrajnaCoin', JSON.stringify({
                address: address,
                hash: hash,
                timestamp: Date.now()
            }));
        }

        // 初始化
        updateHash();
    </script>
</body>
</html>

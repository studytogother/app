<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WORD SLUGGER - 英文單字全壘打</title>
    <style>
        :root {
            --stadium-green: #2ecc71;
            --dirt-brown: #e67e22;
            --sky-blue: #3498db;
            --night-blue: #2c3e50;
            --neon-yellow: #f1c40f;
            --accent-red: #e74c3c;
            --white: #ffffff;
            --text-dark: #2c3e50;
        }

        * { box-sizing: border-box; touch-action: manipulation; font-family: 'Segoe UI', Roboto, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--night-blue); overflow: hidden; color: var(--white); }

        /* --- 遊戲主容器 --- */
        #game-container { position: relative; width: 100%; height: 100dvh; display: flex; flex-direction: column; }

        /* --- 頂部計分板 --- */
        header { 
            height: 70px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-around; 
            align-items: center; border-bottom: 3px solid var(--neon-yellow); z-index: 10;
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: var(--neon-yellow); }
        .stat-value { font-size: 1.2rem; font-weight: bold; }
        .strike-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #444; margin: 0 2px; }
        .strike-active { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red); }

        /* --- 棒球場舞台 --- */
        #stage { 
            flex: 1; position: relative; background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); 
            overflow: hidden; display: flex; justify-content: center; align-items: flex-end;
        }
        
        /* 向量棒球場 */
        .field-svg { position: absolute; bottom: 0; width: 100%; height: 80%; z-index: 1; }
        
        /* 壘包狀態圖 */
        .diamond-mini { position: absolute; top: 10px; right: 10px; width: 60px; height: 60px; transform: rotate(45deg); border: 2px solid rgba(255,255,255,0.3); z-index: 5; }
        .base-dot { position: absolute; width: 12px; height: 12px; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .base-active { background: var(--neon-yellow) !important; box-shadow: 0 0 8px var(--neon-yellow); }
        #base-1 { bottom: -6px; right: -6px; }
        #base-2 { top: -6px; right: -6px; }
        #base-3 { top: -6px; left: -6px; }

        /* 角色與球員 (向量插畫感) */
        #batter-area { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 150px; height: 150px; z-index: 3; }
        .bat { position: absolute; bottom: 60px; left: 80px; width: 10px; height: 80px; background: #d35400; border-radius: 5px; transform-origin: bottom center; transition: 0.1s; }
        .swing { transform: rotate(90deg) !important; }

        /* 動態球 */
        #ball { position: absolute; width: 15px; height: 15px; background: white; border-radius: 50%; display: none; z-index: 4; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }

        /* --- 題目區 --- */
        #ui-area { background: var(--night-blue); padding: 15px; z-index: 10; }
        .word-display { text-align: center; margin-bottom: 15px; min-height: 50px; }
        .letter-slot { 
            display: inline-block; width: 30px; height: 40px; border-bottom: 3px solid var(--white); 
            margin: 0 4px; font-size: 24px; font-weight: bold; text-transform: uppercase; line-height: 40px;
        }
        .meaning-hint { color: var(--neon-yellow); font-size: 1.1rem; margin-bottom: 10px; font-weight: bold; text-align: center; }

        /* --- 鍵盤 --- */
        .keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; max-width: 600px; margin: 0 auto; }
        .key { 
            background: #34495e; border: none; border-radius: 5px; color: white; height: 45px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.1s;
            box-shadow: 0 3px 0 #2c3e50;
        }
        .key:active { transform: translateY(2px); box-shadow: 0 1px 0 #2c3e50; }
        .key.correct { background: var(--stadium-green); }
        .key.wrong { background: var(--accent-red); opacity: 0.5; }

        /* --- 特效 --- */
        #announcer { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 4rem; font-weight: 900; font-style: italic; color: var(--neon-yellow); 
            text-shadow: 4px 4px 0 var(--accent-red); z-index: 20; display: none; pointer-events: none;
        }
        @keyframes homerun-anim { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
        .animate-text { display: block !important; animation: homerun-anim 1s forwards; }

        /* 煙火 */
        .firework { position: absolute; width: 5px; height: 5px; border-radius: 50%; pointer-events: none; }

        /* --- 介面切換 --- */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(10px); background: rgba(0,0,0,0.8); }
        .btn-main { padding: 15px 40px; font-size: 1.5rem; background: var(--neon-yellow); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        /* 背單字模式 */
        #study-screen { display: flex; text-align: center; padding: 20px; background: var(--night-blue); z-index: 90; }
        .study-card { background: white; color: var(--text-dark); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="game-container">
    <header>
        <div class="stat-box">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Question</div>
            <div class="stat-value" id="q-idx">1/10</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Strikes</div>
            <div id="strike-container">
                <span class="strike-dot"></span>
                <span class="strike-dot"></span>
                <span class="strike-dot"></span>
            </div>
        </div>
    </header>

    <div id="stage">
        <svg class="field-svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMax slice">
            <path d="M0 300 L200 100 L400 300 Z" fill="#27ae60" /> <circle cx="200" cy="180" r="30" fill="#d35400" /> <rect x="180" cy="270" width="40" height="30" fill="white" opacity="0.8" /> </svg>

        <div class="diamond-mini">
            <div class="base-dot" id="base-1"></div>
            <div class="base-dot" id="base-2"></div>
            <div class="base-dot" id="base-3"></div>
        </div>

        <div id="batter-area">
            <div class="bat" id="player-bat"></div>
            <svg viewBox="0 0 100 100" width="100">
                <circle cx="40" cy="30" r="15" fill="#f39c12" /> <rect x="35" cy="45" width="10" height="40" fill="#3498db" /> </svg>
        </div>

        <div id="ball"></div>
        <div id="announcer">HOMERUN!</div>
    </div>

    <div id="ui-area">
        <div class="meaning-hint" id="meaning-hint">載入中...</div>
        <div class="word-display" id="word-display"></div>
        <div class="keyboard" id="keyboard"></div>
        <button id="magic-ball-btn" style="width:100%; margin-top:10px; padding:8px; background:var(--sky-blue); border:none; border-radius:5px; color:white; font-weight:bold;">✨ 使用掃描魔球 (Scan Ball)</button>
    </div>

    <div id="study-screen" class="screen" style="display: flex;">
        <h2 style="color:var(--neon-yellow)">📋 賽前暖身 (10分鐘學習)</h2>
        <div id="study-list" style="overflow-y:auto; flex:1; width:100%; max-width:400px; text-align: left; padding: 10px;"></div>
        <div id="timer-display" style="font-size: 1.5rem; margin: 10px; color:var(--accent-red)">10:00</div>
        <button class="btn-main" onclick="startGame()">我準備好了，開打！</button>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="result-title" style="color:var(--neon-yellow); font-size:3rem;">Game Over</h1>
        <p id="result-msg" style="font-size:1.5rem">成功擊出 0 次全壘打</p>
        <button class="btn-main" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
// --- 預設題庫 (若無外部檔案) ---
const fallbackBank = [
    {word: "DETERMINED", meaning: "下定決心的"}, {word: "BRILLIANT", meaning: "燦爛的/卓越的"},
    {word: "CHAMPION", meaning: "冠軍"}, {word: "STRATEGY", meaning: "策略"},
    {word: "VICTORY", meaning: "勝利"}, {word: "PASSION", meaning: "熱情"},
    {word: "COURAGE", meaning: "勇氣"}, {word: "TEAMWORK", meaning: "團隊合作"},
    {word: "SUCCESS", meaning: "成功"}, {word: "LEGEND", meaning: "傳奇"}
];

let allWords = (typeof QuestionBank !== 'undefined') ? QuestionBank.senior[0].words : fallbackBank;
let sessionWords = [];
let currentIndex = 0;
let strikes = 0;
let streak = 0;
let score = 0;
let onBase = [false, false, false]; // 1B, 2B, 3B
let currentWord = "";
let guessedLetters = new Set();
let studyTimer;

// 初始化：過濾已學會單字
function init() {
    const mastered = JSON.parse(localStorage.getItem('mastered_words') || "[]");
    let pool = allWords.filter(w => !mastered.includes(w.word.toUpperCase()));
    
    // 如果單字不夠，重置記憶
    if (pool.length < 10) {
        localStorage.removeItem('mastered_words');
        pool = allWords;
    }

    // 隨機選 10 題
    sessionWords = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
    
    // 渲染學習列表
    const listHtml = sessionWords.map(w => `
        <div class="study-card">
            <strong>${w.word.toUpperCase()}</strong><br>${w.meaning}
        </div>
    `).join('');
    document.getElementById('study-list').innerHTML = listHtml;
    
    startStudyTimer(600); // 10分鐘
}

function startStudyTimer(seconds) {
    let timeLeft = seconds;
    studyTimer = setInterval(() => {
        timeLeft--;
        let min = Math.floor(timeLeft / 60);
        let sec = timeLeft % 60;
        document.getElementById('timer-display').innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
        if (timeLeft <= 0) startGame();
    }, 1000);
}

function startGame() {
    clearInterval(studyTimer);
    document.getElementById('study-screen').style.display = 'none';
    loadQuestion();
}

function loadQuestion() {
    if (currentIndex >= 10) {
        endGame(true);
        return;
    }
    
    currentWord = sessionWords[currentIndex].word.toUpperCase();
    guessedLetters.clear();
    document.getElementById('q-idx').innerText = `${currentIndex + 1}/10`;
    document.getElementById('meaning-hint').innerText = sessionWords[currentIndex].meaning;
    
    renderWord();
    renderKeyboard();
    updateBaseUI();
}

function renderWord() {
    const container = document.getElementById('word-display');
    container.innerHTML = currentWord.split('').map(char => `
        <span class="letter-slot">${guessedLetters.has(char) ? char : ''}</span>
    `).join('');
}

function renderKeyboard() {
    const kb = document.getElementById('keyboard');
    const letters = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');
    kb.innerHTML = letters.map(l => `
        <button class="key" id="key-${l}" onclick="handleGuess('${l}')">${l}</button>
    `).join('');
}

function handleGuess(char) {
    if (guessedLetters.has(char)) return;
    
    const btn = document.getElementById(`key-${char}`);
    if (currentWord.includes(char)) {
        guessedLetters.add(char);
        btn.classList.add('correct');
        renderWord();
        checkWin();
    } else {
        btn.classList.add('wrong');
        handleStrike();
    }
}

function handleStrike() {
    strikes++;
    streak = 0; // 斷連擊
    const dots = document.querySelectorAll('.strike-dot');
    if (strikes <= 3) dots[strikes-1].classList.add('strike-active');
    
    // 動畫：揮棒落空
    const bat = document.getElementById('player-bat');
    bat.classList.add('swing');
    setTimeout(() => bat.classList.remove('swing'), 200);

    if (strikes >= 3) {
        setTimeout(() => endGame(false), 500);
    }
}

function checkWin() {
    const isComplete = currentWord.split('').every(l => guessedLetters.has(l));
    if (isComplete) {
        // 答對邏輯
        streak++;
        currentIndex++;
        
        // 揮棒成功動畫
        playHitAnimation();
        
        // 判斷球種
        setTimeout(() => {
            if (currentIndex === 10) {
                // 第 10 題必殺大滿貫
                triggerHomerun(true);
            } else if (streak === 4) {
                // 四連對全壘打
                triggerHomerun(false);
                streak = 0;
            } else {
                // 普通安打
                triggerHit(streak);
            }
            
            // 存入已學會
            const mastered = JSON.parse(localStorage.getItem('mastered_words') || "[]");
            mastered.push(currentWord);
            localStorage.setItem('mastered_words', JSON.stringify(mastered));
            
            setTimeout(loadQuestion, 2000);
        }, 500);
    }
}

function playHitAnimation() {
    const bat = document.getElementById('player-bat');
    const ball = document.getElementById('ball');
    bat.classList.add('swing');
    
    ball.style.display = 'block';
    ball.style.left = '50%';
    ball.style.bottom = '80px';
    
    // 球飛出去
    ball.animate([
        { bottom: '80px', left: '50%', transform: 'scale(1)' },
        { bottom: '300px', left: Math.random() > 0.5 ? '10%' : '90%', transform: 'scale(0.2)' }
    ], { duration: 800, fill: 'forwards' });

    setTimeout(() => {
        bat.classList.remove('swing');
        ball.style.display = 'none';
    }, 800);
}

function triggerHit(bases) {
    showAnnouncer("HIT!");
    // 簡單邏輯：上壘
    if (bases === 1) onBase[0] = true;
    if (bases === 2) onBase[1] = true;
    if (bases === 3) onBase[2] = true;
    updateBaseUI();
}

function triggerHomerun(isGrandSlam) {
    const text = isGrandSlam ? "GRAND SLAM!!" : "HOMERUN!!";
    showAnnouncer(text);
    
    // 分數計算：清空壘包
    let runners = onBase.filter(b => b).length + 1;
    score += runners;
    document.getElementById('score').innerText = score;
    
    onBase = [false, false, false];
    updateBaseUI();
    
    if (isGrandSlam) createFireworks();
}

function updateBaseUI() {
    document.getElementById('base-1').className = `base-dot ${onBase[0] ? 'base-active' : ''}`;
    document.getElementById('base-2').className = `base-dot ${onBase[1] ? 'base-active' : ''}`;
    document.getElementById('base-3').className = `base-dot ${onBase[2] ? 'base-active' : ''}`;
}

function showAnnouncer(txt) {
    const el = document.getElementById('announcer');
    el.innerText = txt;
    el.classList.add('animate-text');
    setTimeout(() => el.classList.remove('animate-text'), 1500);
}

function createFireworks() {
    for(let i=0; i<30; i++) {
        const fw = document.createElement('div');
        fw.className = 'firework';
        fw.style.left = '50%';
        fw.style.top = '40%';
        fw.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
        document.body.appendChild(fw);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 200;
        fw.animate([
            { transform: 'translate(0,0)', opacity: 1 },
            { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
        ], { duration: 1500, fill: 'forwards' });
        setTimeout(() => fw.remove(), 1500);
    }
}

// 魔法球功能 (Scan Ball)
document.getElementById('magic-ball-btn').onclick = () => {
    const slots = document.querySelectorAll('.letter-slot');
    currentWord.split('').forEach((char, i) => {
        slots[i].innerText = char;
        slots[i].style.color = 'var(--neon-yellow)';
    });
    
    setTimeout(() => {
        currentWord.split('').forEach((char, i) => {
            if (!guessedLetters.has(char)) {
                slots[i].innerText = '';
            }
            slots[i].style.color = 'white';
        });
    }, 1000);
};

function endGame(isWin) {
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('result-title').innerText = isWin ? "CHAMPION!" : "GAME OVER";
    document.getElementById('result-msg').innerText = `最終得分：${score}`;
}

// 啟動
init();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>化生單字測驗 - 般若學習系統</title>
    <script src="question_bank.js?v=5"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-main: #58504A;
            --accent-gold: #CBA37A;
            --accent-jade: #82968C;
            --accent-rose: #CFA4A4;
            /* 雲朵色彩 */
            --cloud-default: #E3F2FD;
            --cloud-correct: #C8E6C9; /* 成功綠 */
            --cloud-wrong: #FFCDD2;   /* 失敗紅 */
            --cloud-melting: #B0BEC5; /* 憂鬱灰 */
            /* 鍵盤色彩 */
            --key-bg: #FFFFFF;
            --key-shadow: #D1D9E6;
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        header { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 10px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.4); }
        .back-btn { display: flex; align-items: center; gap: 6px; color: var(--accent-jade); text-decoration: none; font-size: 0.95rem; background: var(--glass-bg); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer;}

        /* --- 測驗畫面佈局 --- */
        #test-screen { flex: 1; display: none; flex-direction: column; align-items: center; position: relative; width: 100%; overflow: hidden; }
        
        /* 雲朵舞台：加大高度 */
        .spirit-stage { height: 280px; width: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        
        #spirit-character { 
            width: 220px; height: 260px; /* 加大雲朵 */
            transition: transform 0.3s, opacity 0.5s;
            animation: float 4s infinite ease-in-out;
            transform-origin: center bottom;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(2deg); } }

        /* 雲朵本體色彩與過渡 */
        #s-body { transition: fill 0.4s, stroke 0.4s; fill: var(--cloud-default); stroke: #90A4AE; stroke-width: 2.5; }
        .state-correct #s-body { fill: var(--cloud-correct); stroke: var(--accent-jade); }
        .state-wrong #s-body { fill: var(--cloud-wrong); stroke: var(--accent-rose); }
        .melt #s-body { fill: var(--cloud-melting); }

        /* 動態反饋 */
        .bounce-correct { animation: bounce 0.6s ease-out; }
        @keyframes bounce { 0% { transform: scale(1); } 30% { transform: scale(0.8, 1.2); } 50% { transform: scale(1.1, 0.9) translateY(-30px); } 100% { transform: scale(1); } }
        .shake-wrong { animation: shake 0.4s linear; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
        .melt { animation: meltAnim 1.5s forwards ease-in; }
        @keyframes meltAnim { 0% { transform: scale(1); opacity: 1; } 100% { transform: scaleY(0.1) translateY(300px); opacity: 0; } }
        .condense { animation: condenseAnim 1s forwards ease-out; }
        @keyframes condenseAnim { 0% { opacity: 0; transform: scale(0.2); } 100% { opacity: 1; transform: scale(1); } }

        /* --- 單字顯示區 --- */
        .word-test-area { flex-shrink: 0; text-align: center; width: 100%; margin-bottom: 10px; }
        .letter-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding: 0 10px; }
        .letter-dash { width: 35px; height: 45px; border-bottom: 4px solid var(--accent-gold); font-size: 1.8rem; font-weight: bold; display: flex; align-items: flex-end; justify-content: center; color: var(--text-main); }

        /* --- 升級版鍵盤：大且可愛 --- */
        .keyboard-container { width: 100%; padding: 10px 8px env(safe-area-inset-bottom); background: rgba(255,255,255,0.3); border-top-left-radius: 30px; border-top-right-radius: 30px; }
        .kb-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; width: 100%; }
        .key { 
            height: 54px; flex: 1; max-width: 42px; 
            background: var(--key-bg); 
            border: none; border-radius: 12px;
            font-size: 1.3rem; font-weight: bold; color: var(--text-main);
            box-shadow: 0 4px 0 var(--key-shadow);
            display: flex; justify-content: center; align-items: center;
            transition: 0.1s; cursor: pointer;
        }
        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--key-shadow); }
        .key.correct { background: var(--accent-jade) !important; color: white !important; box-shadow: 0 4px 0 #5E7A6D; pointer-events: none; }
        .key.wrong { background: var(--accent-rose) !important; color: white !important; box-shadow: 0 4px 0 #A57C7C; opacity: 0.6; pointer-events: none; }

        .wisdom-eye-btn { position: absolute; top: 15px; right: 20px; background: var(--glass-bg); border: 2px solid var(--accent-gold); color: var(--accent-gold); padding: 8px 15px; border-radius: 20px; font-weight: bold; z-index: 20; }
        
        /* 選關與吸收畫面樣式 (簡化保留) */
        #level-select-screen, #absorb-screen, #result-screen { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .grid-container { width: 100%; max-width: 500px; display: grid; gap: 12px; }
        .group-btn { background: var(--glass-bg); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; width: 100%; border: 1px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .vajra-btn { width: 90%; max-width: 320px; padding: 20px; background: var(--accent-gold); color: white; border-radius: 25px; border: none; font-size: 1.2rem; font-weight: bold; margin: 20px 0; box-shadow: 0 6px 0 #A68563; }
        .vajra-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #A68563; }
    </style>
</head>
<body>

<header>
    <div class="back-btn" onclick="goBackOrExit()">返回</div>
    <div id="header-title" style="font-weight:bold;">妙依修煉場</div>
    <div id="global-timer" style="font-weight:bold; color:var(--accent-gold);"></div>
</header>

<div id="level-select-screen">
    <div class="grid-container" id="level-grid"></div>
</div>

<div id="absorb-screen" style="display:none;">
    <div id="word-list-container" style="width:100%; max-width:500px;"></div>
    <button class="vajra-btn" onclick="startTest()">開始天籟盲測</button>
</div>

<div id="test-screen">
    <button class="wisdom-eye-btn" onclick="useCheatEye()">慧眼</button>
    <div id="cheat-overlay" style="position:absolute; top:40%; font-size:3rem; font-weight:bold; color:var(--accent-gold); display:none; z-index:100;"></div>

    <div class="spirit-stage" id="spirit-stage">
        <svg id="spirit-character" viewBox="0 0 200 240" onclick="playCurrentWordAudio()">
            <g id="rocket" style="opacity:0; transition:0.5s;">
                <path d="M100 120 L85 150 L115 150 Z" fill="#FF8A65" />
                <rect x="92" y="150" width="16" height="25" rx="4" fill="var(--accent-gold)" />
            </g>
            <path id="s-body" d="M50,130 Q30,130 30,110 Q30,80 60,80 Q60,50 100,50 Q140,50 140,80 Q170,80 170,110 Q170,130 150,130 Z" />
            <g id="s-head" class="part">
                <line x1="80" y1="95" x2="100" y2="95" stroke="#333" stroke-width="4" stroke-linecap="round" />
                <line x1="110" y1="95" x2="130" y2="95" stroke="#333" stroke-width="4" stroke-linecap="round" />
                <path id="s-mouth-pout" d="M95 112 Q105 108 115 112" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round" />
                <circle id="s-mouth-surprise" cx="105" cy="115" r="8" stroke="#333" stroke-width="3" fill="none" style="opacity:0" />
                <path id="s-mouth-dead" d="M95 115 L115 115" stroke="#333" stroke-width="3" stroke-linecap="round" style="opacity:0" />
            </g>
            <g id="s-legs" class="part">
                <line x1="85" y1="130" x2="85" y2="200" stroke="#90A4AE" stroke-width="5" stroke-linecap="round" />
                <line x1="125" y1="130" x2="125" y2="200" stroke="#90A4AE" stroke-width="5" stroke-linecap="round" />
            </g>
        </svg>
    </div>
    
    <div class="word-test-area">
        <div class="letter-row" id="letter-row"></div>
    </div>

    <div class="keyboard-container" id="keyboard"></div>
</div>

<div id="result-screen" style="display:none;">
    <h1 style="color:var(--accent-jade);">修煉圓滿</h1>
    <p id="result-desc"></p>
    <button class="vajra-btn" onclick="location.reload()">再練一次</button>
</div>

<script>
let currentWords = []; let testIndex = 0; let mistakes = 0; 
let guessedLetters = new Set(); let correctCount = 0; let usedCheat = false;

// 初始化模擬數據 (若沒讀到 question_bank.js)
if (typeof QuestionBank === 'undefined') {
    window.QuestionBank = { senior: [{title: "入門修煉", words: [{word:"BODHI", meaning:"覺悟"}, {word:"PEACE", meaning:"和平"}]}] };
}

function init() {
    const grid = document.getElementById('level-grid');
    QuestionBank.senior.forEach(g => {
        const btn = document.createElement('div');
        btn.className = 'group-btn';
        btn.innerHTML = `<b>${g.title}</b><span>進場</span>`;
        btn.onclick = () => { currentWords = g.words; showAbsorb(); };
        grid.appendChild(btn);
    });
}

function showAbsorb() {
    document.getElementById('level-select-screen').style.display = 'none';
    document.getElementById('absorb-screen').style.display = 'flex';
    document.getElementById('word-list-container').innerHTML = currentWords.map(w => `
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
            <div><b>${w.word}</b><br><small>${w.meaning}</small></div>
            <button onclick="speak('${w.word}')">聽</button>
        </div>
    `).join('');
}

function startTest() {
    document.getElementById('absorb-screen').style.display = 'none';
    document.getElementById('test-screen').style.display = 'flex';
    testIndex = 0; correctCount = 0;
    loadWordTest();
}

function loadWordTest() {
    if (testIndex >= currentWords.length) { showResult(); return; }
    guessedLetters.clear(); mistakes = 0; usedCheat = false;
    
    const char = document.getElementById('spirit-character');
    char.className = "condense"; 
    document.getElementById('rocket').style.opacity = "0";
    setMouth('pout');
    document.querySelectorAll('.part').forEach(p => p.classList.remove('visible'));
    
    document.getElementById('letter-row').innerHTML = currentWords[testIndex].word.split('').map(() => `<div class="letter-dash"></div>`).join('');
    
    renderKeyboard();
    setTimeout(() => { char.classList.remove('condense'); playCurrentWordAudio(); }, 800);
}

function renderKeyboard() {
    const kb = document.getElementById('keyboard');
    const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
    kb.innerHTML = rows.map(row => `
        <div class="kb-row">
            ${row.split('').map(l => `<button class="key" id="key-${l}" onclick="handleGuess('${l}')">${l}</button>`).join('')}
        </div>
    `).join('');
}

function handleGuess(l) {
    const word = currentWords[testIndex].word.toUpperCase();
    const char = document.getElementById('spirit-character');
    const keyBtn = document.getElementById(`key-${l}`);

    char.classList.remove('bounce-correct', 'shake-wrong', 'state-correct', 'state-wrong');
    void char.offsetWidth;

    if (word.includes(l)) {
        guessedLetters.add(l);
        keyBtn.classList.add('correct');
        char.classList.add('bounce-correct', 'state-correct');
        setMouth('surprise');
        updateDashes();
        updateSpirit();
        if (word.split('').every(char => guessedLetters.has(char))) {
            if(!usedCheat) correctCount++;
            triggerWin();
        }
    } else {
        mistakes++;
        keyBtn.classList.add('wrong');
        char.classList.add('shake-wrong', 'state-wrong');
        if (mistakes >= 5) triggerMelt();
    }
}

function updateDashes() {
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((l, i) => { if(guessedLetters.has(l)) dashes[i].innerText = l; });
}

function updateSpirit() {
    const p = guessedLetters.size / new Set(currentWords[testIndex].word).size;
    if(p > 0.2) document.getElementById('s-body').classList.add('visible');
    if(p > 0.5) document.getElementById('s-head').classList.add('visible');
    if(p > 0.8) document.getElementById('s-legs').classList.add('visible');
}

function setMouth(s) {
    document.getElementById('s-mouth-pout').style.opacity = s==='pout'?1:0;
    document.getElementById('s-mouth-surprise').style.opacity = s==='surprise'?1:0;
    document.getElementById('s-mouth-dead').style.opacity = s==='dead'?1:0;
}

function triggerWin() {
    document.getElementById('keyboard').style.pointerEvents = 'none';
    document.getElementById('rocket').style.opacity = "1";
    setTimeout(() => {
        document.getElementById('spirit-character').style.transform = "translateY(-1000px)";
        playCurrentWordAudio();
        setTimeout(() => { testIndex++; loadWordTest(); }, 1000);
    }, 600);
}

function triggerMelt() {
    document.getElementById('keyboard').style.pointerEvents = 'none';
    setMouth('dead');
    document.getElementById('spirit-character').classList.add('melt');
    // 顯示正確答案
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((l, i) => { dashes[i].innerText = l; dashes[i].style.color = 'var(--accent-rose)'; });
    
    setTimeout(() => { testIndex++; loadWordTest(); }, 2000);
}

function useCheatEye() {
    if(usedCheat) return;
    usedCheat = true;
    const overlay = document.getElementById('cheat-overlay');
    overlay.innerText = currentWords[testIndex].word;
    overlay.style.display = 'block';
    setTimeout(() => overlay.style.display = 'none', 1000);
}

function speak(t) {
    window.speechSynthesis.cancel();
    let m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; m.rate = 0.8;
    window.speechSynthesis.speak(m);
}
function playCurrentWordAudio() { speak(currentWords[testIndex].word); }
function goBackOrExit() { location.reload(); }

window.onload = init;
</script>
</body>
</html>

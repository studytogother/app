<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>化生單字測驗 - 般若學習系統</title>
    <script src="question_bank.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; 
            --accent-gold: #CBA37A; 
            --accent-jade: #82968C; 
            --accent-rose: #CFA4A4;
        }

        * { box-sizing: border-box; touch-action: manipulation; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        /* --- 頂部能量與計時 --- */
        header { width: 100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); background: rgba(255,255,255,0.4); }
        .timer-badge { font-weight: bold; color: var(--accent-gold); font-size: 1.1rem; }

        /* --- 階段一：定心吸收 (10分鐘記憶) --- */
        #absorb-screen { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .word-list-card { width: 100%; max-width: 500px; background: var(--glass-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .absorb-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(203,163,122,0.1); }
        .absorb-word-info { flex: 1; }
        .absorb-word { font-weight: bold; font-size: 1.2rem; color: var(--accent-jade); }
        .absorb-root { font-size: 0.8rem; color: var(--accent-gold); margin-top: 4px; }
        
        /* --- 階段二/三：測驗畫面 --- */
        #test-screen { flex: 1; display: none; flex-direction: column; align-items: center; position: relative; width: 100%; overflow: hidden; }
        
        /* 拙趣火柴人與火箭容器 */
        .spirit-stage { height: 250px; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; margin-top: 20px; }
        #stickman-svg { width: 200px; height: 240px; transition: 0.5s; z-index: 5; }
        .s-line { fill: none; stroke: var(--accent-jade); stroke-width: 5; stroke-linecap: round; }
        .s-fill { fill: #fff; stroke: var(--accent-jade); stroke-width: 5; }
        .part { opacity: 0; transition: opacity 0.5s; }
        .visible { opacity: 1 !important; }

        /* 火箭升天動畫 */
        #rocket { opacity: 0; transition: 0.8s; }
        .rocket-active #rocket { opacity: 1; transform: translateY(-50px); }
        .liftoff { animation: liftoffAnim 2.5s forwards cubic-bezier(0.4, 0, 1, 1); }
        @keyframes liftoffAnim { 0% { transform: translateY(0); } 100% { transform: translateY(-1200px); } }

        /* 單字底線區 */
        .word-test-area { margin-top: 30px; text-align: center; }
        .letter-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .letter-dash { width: 30px; height: 40px; border-bottom: 3px solid #ccc; font-size: 1.8rem; font-weight: bold; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; }

        /* 鍵盤 */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; padding: 0 15px 30px; max-width: 600px; }
        .key { width: calc(10% - 6px); height: 45px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .key.correct { background: var(--accent-jade); color: white; border-color: var(--accent-jade); }
        .key.wrong { background: var(--accent-rose); opacity: 0.3; pointer-events: none; }

        /* 底部巨大按鈕 */
        .vajra-btn { width: 90%; max-width: 320px; padding: 18px; background: var(--accent-gold); color: white; border: none; border-radius: 20px; font-size: 1.1rem; letter-spacing: 2px; cursor: pointer; box-shadow: 0 10px 20px rgba(203,163,122,0.3); margin: 20px 0; }
        .vajra-btn:active { transform: scale(0.95); }

        /* --- 結果畫面 --- */
        #result-screen { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div id="header-title" style="font-weight:bold; letter-spacing:1px;">定心吸收階段</div>
    <div class="timer-badge" id="global-timer">10:00</div>
</header>

<div id="absorb-screen">
    <div style="margin-bottom:20px; text-align:center; color:var(--text-light); font-size:0.9rem;">請在時間內熟悉以下單字，準備接受聽力考驗</div>
    <div class="word-list-card" id="word-list-container"></div>
    <button class="vajra-btn" onclick="startTest()">我準備好了，開始測驗</button>
</div>

<div id="test-screen">
    <div class="spirit-stage" id="spirit-stage">
        <svg id="stickman-svg" viewBox="0 0 200 240">
            <g id="rocket"><path d="M100 150 L80 190 L120 190 Z" fill="#fff" stroke="var(--accent-gold)" stroke-width="4"/><rect x="85" y="190" width="30" height="20" fill="var(--accent-gold)"/></g>
            <g id="s-body" class="part"><rect x="85" y="100" width="30" height="50" rx="5" class="s-fill"/></g>
            <g id="s-head" class="part"><rect x="75" y="40" width="50" height="50" rx="10" class="s-fill"/><circle cx="90" cy="60" r="3" fill="#333"/><circle cx="110" cy="60" r="3" fill="#333"/></g>
            <g id="s-arms" class="part"><path d="M85 110 L60 130 M115 110 L140 130" class="s-line"/></g>
            <g id="s-legs" class="part"><path d="M90 150 L80 180 M110 150 L120 180" class="s-line"/></g>
        </svg>
    </div>
    
    <div class="word-test-area">
        <div id="listen-hint" style="color:var(--accent-gold); margin-bottom:10px; font-weight:bold;">點擊火柴人聆聽單字</div>
        <div class="letter-row" id="letter-row"></div>
    </div>

    <div class="keyboard" id="keyboard"></div>
</div>

<div id="result-screen">
    <h1 id="result-title" style="color:var(--accent-jade);">修煉圓滿</h1>
    <p id="result-desc"></p>
    <button class="vajra-btn" onclick="window.location.href='index.html'">返回大廳</button>
</div>

<script>
let currentCluster = QuestionBank.clusters[0]; // 預設讀取第一個群組
let currentStep = 0; // 0: 吸收, 1: 測驗, 2: 結果
let testIndex = 0; 
let mistakes = 0;
let guessedLetters = new Set();
let correctCount = 0;

// 初始化吸收畫面
function initAbsorb() {
    const container = document.getElementById('word-list-container');
    container.innerHTML = currentCluster.words.map(w => `
        <div class="absorb-item">
            <div class="absorb-word-info">
                <div class="absorb-word">${w.word}</div>
                <div class="absorb-root">${w.root}</div>
            </div>
            <div style="text-align:right;">
                <div style="font-size:0.9rem;">${w.meaning}</div>
                <button onclick="speak('${w.word}')" style="background:none; border:none; color:var(--accent-gold); cursor:pointer;">(聽發音)</button>
            </div>
        </div>
    `).join('');
    startGlobalTimer(600); // 10分鐘
}

// 全域倒數計時
function startGlobalTimer(seconds) {
    let timeLeft = seconds;
    const timerEl = document.getElementById('global-timer');
    const interval = setInterval(() => {
        if (currentStep !== 0) { clearInterval(interval); return; }
        if (timeLeft <= 0) { clearInterval(interval); startTest(); return; }
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        timerEl.innerText = `${m}:${s < 10 ? '0' + s : s}`;
    }, 1000);
}

// 開始測驗模式 (盲盒聽音模式)
function startTest() {
    currentStep = 1;
    document.getElementById('absorb-screen').style.display = 'none';
    document.getElementById('test-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "天籟盲測挑戰";
    loadWordTest();
}

function loadWordTest() {
    if (testIndex >= currentCluster.words.length) {
        showFinalResult();
        return;
    }
    
    guessedLetters.clear();
    mistakes = 0;
    const wordObj = currentCluster.words[testIndex];
    
    // 重置火柴人部位
    document.querySelectorAll('.part').forEach(p => p.classList.remove('visible'));
    document.getElementById('spirit-stage').classList.remove('rocket-active', 'liftoff');
    
    // 生成空格
    const row = document.getElementById('letter-row');
    row.innerHTML = wordObj.word.split('').map(() => `<div class="letter-dash"></div>`).join('');
    
    // 生成鍵盤
    initKeyboard();
    
    // 自動播放發音
    speak(wordObj.word);
}

function handleGuess(letter, btn) {
    const word = currentCluster.words[testIndex].word.toUpperCase();
    if (word.includes(letter)) {
        guessedLetters.add(letter);
        btn.classList.add('correct');
        updateDashes();
        updateStickman();
        if (isWordComplete()) {
            correctCount++;
            triggerWin();
        }
    } else {
        mistakes++;
        btn.classList.add('wrong');
        if (mistakes >= 5) revealAnswer();
    }
}

function updateDashes() {
    const word = currentCluster.words[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((char, i) => {
        if (guessedLetters.has(char)) dashes[i].innerText = char;
    });
}

function updateStickman() {
    const parts = ['s-body', 's-head', 's-arms', 's-legs'];
    const word = currentCluster.words[testIndex].word;
    const progress = guessedLetters.size / new Set(word.toUpperCase().split('')).size;
    if (progress > 0.2) document.getElementById('s-body').classList.add('visible');
    if (progress > 0.4) document.getElementById('s-head').classList.add('visible');
    if (progress > 0.6) document.getElementById('s-arms').classList.add('visible');
    if (progress > 0.8) document.getElementById('s-legs').classList.add('visible');
}

function triggerWin() {
    document.getElementById('spirit-stage').classList.add('rocket-active');
    setTimeout(() => {
        document.getElementById('spirit-stage').classList.add('liftoff');
        setTimeout(() => {
            testIndex++;
            loadWordTest();
        }, 1500);
    }, 800);
}

function showFinalResult() {
    document.getElementById('test-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('result-desc').innerText = `今日修煉完成！\n您成功讓 ${correctCount} 個單字化生升空。`;
}

// 語音引擎 (TTS)
function speak(text) {
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    msg.rate = 0.8;
    window.speechSynthesis.speak(msg);
}

function initKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = 'QWERTYUIOPASDFGHJKLZXCVBNM'.split('').map(l => `<button class="key" onclick="handleGuess('${l}', this)">${l}</button>`).join('');
}

function isWordComplete() {
    const word = currentCluster.words[testIndex].word.toUpperCase();
    return word.split('').every(l => guessedLetters.has(l));
}

window.onload = initAbsorb;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>化生單字測驗 - 般若學習系統</title>
    <script src="question_bank.js?v=5"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A;
            --text-light: #968E86;
            --accent-gold: #CBA37A;
            --accent-jade: #82968C;
            --accent-rose: #CFA4A4;
            /* 雲朵插畫色 */
            --cloud-top: #E1F5FE;
            --cloud-bottom: #B3E5FC;
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        header { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); background: rgba(255,255,255,0.4); z-index: 100; }
        .timer-badge { font-weight: bold; color: var(--accent-gold); font-size: 1.1rem; }
        .back-btn { display: flex; align-items: center; gap: 6px; color: var(--accent-jade); text-decoration: none; font-size: 0.95rem; background: var(--glass-bg); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer;}

        /* --- 階段零：選關畫面 --- */
        #level-select-screen { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .lock-banner { background: rgba(207, 164, 164, 0.15); border: 1px solid var(--accent-rose); color: var(--accent-rose); padding: 12px 20px; border-radius: 12px; font-size: 0.95rem; font-weight: bold; text-align: center; margin-bottom: 20px; display: none; width: 100%; max-width: 500px;}
        .section-title { width: 100%; max-width: 500px; font-size: 1.1rem; color: var(--accent-jade); border-bottom: 2px solid rgba(130, 150, 140, 0.2); padding-bottom: 8px; margin: 15px 0; font-weight: bold; }
        .grid-container { width: 100%; max-width: 500px; display: grid; grid-template-columns: 1fr; gap: 12px; }
        .group-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 18px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; text-align: left; }
        .group-btn:active { transform: scale(0.97); }

        /* --- 階段一：定心吸收 --- */
        #absorb-screen { flex: 1; padding: 20px; overflow-y: auto; display: none; flex-direction: column; align-items: center; }
        .word-list-card { width: 100%; max-width: 500px; background: var(--glass-bg); border-radius: 20px; padding: 10px 20px; margin-bottom: 20px;}
        .absorb-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(203,163,122,0.15); }
        .absorb-word { font-weight: bold; font-size: 1.25rem; color: var(--accent-jade); }
        .audio-btn { padding: 6px 12px; border-radius: 12px; border: 1px solid rgba(203,163,122,0.4); background: rgba(203,163,122,0.1); color: var(--accent-gold); font-weight: bold; cursor: pointer; }

        /* --- 階段二：測驗畫面 --- */
        #test-screen { flex: 1; display: none; flex-direction: column; align-items: center; position: relative; width: 100%; overflow: hidden; }
        .spirit-stage { height: 260px; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; margin-top: 5px; }
        
        #cloud-svg { width: 200px; height: 240px; transition: 0.5s; z-index: 5; animation: float 4s infinite ease-in-out; transform-origin: center bottom; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(1deg); } }
        
        .s-line { fill: none; stroke: var(--text-main); stroke-width: 4; stroke-linecap: round; }
        .part { opacity: 0; transition: 0.4s; } .visible { opacity: 1 !important; }

        /* 動態效果：凝聚、融化、升空 */
        .condense { animation: condenseAnim 0.8s forwards ease-out; }
        @keyframes condenseAnim { 0% { opacity: 0; transform: scale(0.2); } 100% { opacity: 1; transform: scale(1); } }
        
        .melt { animation: meltAnim 1.5s forwards ease-in; }
        @keyframes meltAnim { 0% { transform: scaleY(1); opacity: 1; } 100% { transform: scaleY(0.1) translateY(400px); opacity: 0; } }
        
        #rocket { opacity: 0; transition: 0.6s; }
        .rocket-active #rocket { opacity: 1; transform: translateY(-20px); }
        .liftoff { animation: liftoffAnim 1.5s forwards cubic-bezier(0.4, 0, 1, 1); }
        @keyframes liftoffAnim { 0% { transform: translateY(0); } 100% { transform: translateY(-1000px); } }

        /* 單字欄位 */
        .word-test-area { margin-top: 0px; text-align: center; flex-shrink: 0; }
        .letter-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; padding: 0 15px;}
        .letter-dash { width: 32px; height: 42px; border-bottom: 3px solid var(--accent-gold); font-size: 1.7rem; font-weight: bold; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; color: var(--text-main); }
        .letter-dash.error-reveal { color: var(--accent-rose); border-bottom-color: var(--accent-rose); }

        /* --- 大尺寸果凍鍵盤 --- */
        .keyboard-container { width: 100%; background: rgba(255,255,255,0.4); padding: 12px 8px env(safe-area-inset-bottom); border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -5px 15px rgba(0,0,0,0.02); }
        .kb-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; }
        .key { 
            flex: 1; max-width: 45px; height: 52px; 
            background: #fff; border: none; border-radius: 12px;
            font-size: 1.2rem; font-weight: bold; color: var(--text-main);
            box-shadow: 0 4px 0 #D1D9E6;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.1s;
        }
        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 #D1D9E6; }
        .key.correct { background: var(--accent-jade); color: white; box-shadow: 0 4px 0 #6A7D74; pointer-events: none; }
        .key.wrong { background: var(--accent-rose); color: white; box-shadow: 0 4px 0 #A57C7C; opacity: 0.5; pointer-events: none; }

        .wisdom-eye-btn { position: absolute; top: 10px; right: 20px; background: var(--glass-bg); border: 2px solid var(--accent-gold); color: var(--accent-gold); padding: 6px 12px; border-radius: 15px; font-size: 0.85rem; cursor: pointer; font-weight: bold; z-index: 20; }
        #cheat-overlay { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: var(--accent-gold); padding: 12px 30px; border-radius: 15px; font-size: 2.2rem; font-weight: bold; z-index: 50; display: none; letter-spacing: 4px; }

        .vajra-btn { width: 90%; max-width: 320px; padding: 18px; background: var(--accent-gold); color: white; border: none; border-radius: 20px; font-size: 1.1rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; margin: 20px 0; box-shadow: 0 5px 0 #A68563; }
        .vajra-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #A68563; }
        
        #result-screen { flex: 1; display: none; flex-direction: column; align-items: center; padding: 30px 20px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="back-btn" onclick="goBackOrExit()">返回</div>
    <div id="header-title" style="font-weight:bold;">選擇修煉群組</div>
    <div class="timer-badge" id="global-timer"></div>
</header>

<div id="level-select-screen">
    <div class="lock-banner" id="lock-banner">今日修煉已圓滿。</div>
    <div class="section-title">高中 7000 單字修煉</div>
    <div class="grid-container" id="senior-grid"></div>
    <div class="section-title">托福高階無礙</div>
    <div class="grid-container" id="toefl-grid"></div>
</div>

<div id="absorb-screen">
    <div class="word-list-card" id="word-list-container"></div>
    <button class="vajra-btn" onclick="startTest()">開始天籟盲測</button>
</div>

<div id="test-screen">
    <button class="wisdom-eye-btn" onclick="useCheatEye()">慧眼</button>
    <div id="cheat-overlay"></div>

    <div class="spirit-stage" id="spirit-stage">
        <svg id="cloud-svg" viewBox="0 0 200 240" onclick="playCurrentWordAudio()">
            <defs>
                <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:var(--cloud-top);stop-opacity:1" />
                    <stop offset="100%" style="stop-color:var(--cloud-bottom);stop-opacity:1" />
                </linearGradient>
            </defs>
            <g id="rocket"><path d="M100 130 L85 160 L115 160 Z" fill="var(--accent-rose)" /><rect x="92" y="160" width="16" height="20" fill="var(--accent-gold)"/></g>
            <path id="s-body" class="part" fill="url(#cloudGrad)" d="M50,130 Q30,130 30,110 Q30,80 60,80 Q60,50 100,50 Q140,50 140,80 Q170,80 170,110 Q170,130 150,130 Z" stroke="#90A4AE" stroke-width="2" />
            <g id="s-head" class="part">
                <line x1="80" y1="95" x2="100" y2="95" stroke="#333" stroke-width="4" stroke-linecap="round" />
                <line x1="110" y1="95" x2="130" y2="95" stroke="#333" stroke-width="4" stroke-linecap="round" />
                <path d="M95 112 Q105 108 115 112" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round" />
            </g>
            <g id="s-legs" class="part">
                <line x1="85" y1="130" x2="85" y2="200" class="s-line" stroke-width="5" />
                <line x1="125" y1="130" x2="125" y2="200" class="s-line" stroke-width="5" />
            </g>
        </svg>
    </div>
    
    <div class="word-test-area">
        <div class="letter-row" id="letter-row"></div>
    </div>
    <div class="keyboard-container" id="keyboard"></div>
</div>

<div id="result-screen">
    <h1 style="color:var(--accent-jade);">修煉圓滿</h1>
    <p id="result-desc"></p>
    <button class="vajra-btn" onclick="location.reload()">返回大廳</button>
</div>

<script>
window.sysUtterances = [];
let currentWords = []; let currentStep = -1; let testIndex = 0; 
let mistakes = 0; let guessedLetters = new Set(); let correctCount = 0; let usedCheat = false;
let globalTimerInterval;

function initLevelSelect() {
    currentStep = -1;
    const d = new Date();
    const todayStr = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const isLocked = (localStorage.getItem('prajna_last_completed_date') === todayStr);
    if(isLocked) document.getElementById('lock-banner').style.display = 'block';

    function renderGrid(containerId, category) {
        const grid = document.getElementById(containerId); grid.innerHTML = '';
        if(window.QuestionBank && QuestionBank[category]) {
            QuestionBank[category].forEach(group => {
                const btn = document.createElement('div');
                btn.className = `group-btn ${isLocked ? 'locked' : ''}`;
                btn.innerHTML = `<span class="g-title">${group.title}</span><span class="g-status">任務</span>`;
                btn.onclick = () => { currentWords = group.words; initAbsorb(); };
                grid.appendChild(btn);
            });
        }
    }
    renderGrid('senior-grid', 'senior'); renderGrid('toefl-grid', 'toefl');
}

function goBackOrExit() {
    if (currentStep === -1 || currentStep === 2) window.location.href = 'index.html';
    else {
        clearInterval(globalTimerInterval);
        document.getElementById('absorb-screen').style.display = 'none';
        document.getElementById('test-screen').style.display = 'none';
        document.getElementById('level-select-screen').style.display = 'flex';
        document.getElementById('header-title').innerText = "選擇修煉群組";
        document.getElementById('global-timer').innerText = "";
        currentStep = -1;
    }
}

function initAbsorb() {
    currentStep = 0;
    document.getElementById('level-select-screen').style.display = 'none';
    document.getElementById('absorb-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "定心吸收";
    document.getElementById('word-list-container').innerHTML = currentWords.map(w => `
        <div class="absorb-item">
            <div style="flex:1;">
                <div class="absorb-word">${w.word}</div>
                <div style="font-size:0.95rem;">${w.meaning}</div>
            </div>
            <button class="audio-btn" onclick="speak('${w.word}')">聽發音</button>
        </div>
    `).join('');
    
    let timeLeft = 600;
    globalTimerInterval = setInterval(() => {
        if (currentStep !== 0) { clearInterval(globalTimerInterval); return; }
        if (timeLeft <= 0) { startTest(); return; }
        timeLeft--;
        document.getElementById('global-timer').innerText = `${Math.floor(timeLeft / 60)}:${timeLeft % 60 < 10 ? '0' : ''}${timeLeft % 60}`;
    }, 1000);
}

function startTest() {
    currentStep = 1; clearInterval(globalTimerInterval);
    document.getElementById('absorb-screen').style.display = 'none';
    document.getElementById('test-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "天籟盲測";
    testIndex = 0; correctCount = 0;
    loadWordTest();
}

function loadWordTest() {
    if (testIndex >= currentWords.length) { showFinalResult(); return; }
    guessedLetters.clear(); mistakes = 0; usedCheat = false;
    
    // 凝聚化生邏輯
    const svg = document.getElementById('cloud-svg');
    svg.classList.remove('melt');
    svg.classList.add('condense');
    document.querySelectorAll('.part').forEach(p => p.classList.remove('visible'));
    document.getElementById('spirit-stage').classList.remove('rocket-active', 'liftoff');
    
    // 完全空白開局
    document.getElementById('letter-row').innerHTML = currentWords[testIndex].word.split('').map(() => `<div class="letter-dash"></div>`).join('');
    
    initKeyboard();
    setTimeout(() => { svg.classList.remove('condense'); playCurrentWordAudio(); }, 800);
}

function useCheatEye() {
    if(usedCheat) return; usedCheat = true;
    const overlay = document.getElementById('cheat-overlay');
    overlay.innerText = currentWords[testIndex].word.toUpperCase();
    overlay.style.display = 'block';
    setTimeout(() => { overlay.style.display = 'none'; }, 850);
}

function handleGuess(letter, btn) {
    const word = currentWords[testIndex].word.toUpperCase();
    const svg = document.getElementById('cloud-svg');
    
    if (word.includes(letter)) {
        guessedLetters.add(letter); btn.classList.add('correct');
        updateDashes(); updateSpirit();
        // 驚訝彈跳
        svg.style.transform = "scale(1.15)";
        setTimeout(() => svg.style.transform = "scale(1)", 150);
        
        if (word.split('').every(l => guessedLetters.has(l))) {
            if(!usedCheat) correctCount++; triggerWin();
        }
    } else {
        mistakes++; btn.classList.add('wrong');
        svg.style.transform = "translateX(12px) rotate(4deg)";
        setTimeout(() => svg.style.transform = "translateX(0) rotate(0deg)", 200);
        if (mistakes >= 5) revealAnswer();
    }
}

function updateDashes() {
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((char, i) => { if (guessedLetters.has(char)) dashes[i].innerText = char; });
}

function updateSpirit() {
    const p = guessedLetters.size / new Set(currentWords[testIndex].word.toUpperCase().split('')).size;
    if (p > 0) document.getElementById('s-body').classList.add('visible');
    if (p > 0.4) document.getElementById('s-head').classList.add('visible');
    if (p > 0.8) document.getElementById('s-legs').classList.add('visible');
}

function triggerWin() {
    document.querySelectorAll('.part').forEach(p => p.classList.add('visible'));
    document.getElementById('keyboard').style.pointerEvents = 'none';
    document.getElementById('spirit-stage').classList.add('rocket-active');
    setTimeout(() => { 
        document.getElementById('spirit-stage').classList.add('liftoff'); 
        playCurrentWordAudio(); 
        setTimeout(() => { testIndex++; loadWordTest(); }, 1600); 
    }, 800);
}

function revealAnswer() {
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    document.getElementById('keyboard').style.pointerEvents = 'none';
    document.getElementById('cloud-svg').classList.add('melt');
    word.split('').forEach((char, i) => { 
        if (!guessedLetters.has(char)) { dashes[i].innerText = char; dashes[i].classList.add('error-reveal'); }
    });
    setTimeout(() => { testIndex++; loadWordTest(); }, 2000);
}

function showFinalResult() {
    currentStep = 2;
    document.getElementById('test-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "結算";
    document.getElementById('result-desc').innerHTML = `修煉圓滿！成功化生：<b>${correctCount}</b> / ${currentWords.length}`;
    localStorage.setItem('prajna_last_completed_date', `${new Date().getFullYear()}-${new Date().getMonth()+1}-${new Date().getDate()}`);
}

function playCurrentWordAudio() { speak(currentWords[testIndex].word); }
function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text); msg.lang = 'en-US'; msg.rate = 0.85; 
    window.speechSynthesis.speak(msg);
}

function initKeyboard() {
    const kb = document.getElementById('keyboard');
    const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
    kb.innerHTML = rows.map(row => `
        <div class="kb-row">
            ${row.split('').map(l => `<button class="key" onclick="handleGuess('${l}', this)">${l}</button>`).join('')}
        </div>
    `).join('');
    kb.style.pointerEvents = 'auto';
}

window.onload = initLevelSelect;
</script>
</body>
</html>

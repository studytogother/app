<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>化生單字測驗 - 般若學習系統</title>
    <script src="question_bank.js?v=5"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.75); --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; --text-light: #968E86;
            --accent-gold: #CBA37A; --accent-jade: #82968C; --accent-rose: #CFA4A4;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        header { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); background: rgba(255,255,255,0.4); }
        .timer-badge { font-weight: bold; color: var(--accent-gold); font-size: 1.1rem; }
        .back-btn { display: flex; align-items: center; gap: 6px; color: var(--accent-jade); text-decoration: none; font-size: 0.95rem; background: var(--glass-bg); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer;}

        /* --- 階段零：選關畫面 --- */
        #level-select-screen { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .lock-banner { background: rgba(207, 164, 164, 0.15); border: 1px solid var(--accent-rose); color: var(--accent-rose); padding: 12px 20px; border-radius: 12px; font-size: 0.95rem; font-weight: bold; text-align: center; margin-bottom: 20px; display: none; width: 100%; max-width: 500px;}
        .section-title { width: 100%; max-width: 500px; font-size: 1.1rem; color: var(--accent-jade); border-bottom: 2px solid rgba(130, 150, 140, 0.2); padding-bottom: 8px; margin: 15px 0; font-weight: bold; }
        .grid-container { width: 100%; max-width: 500px; display: grid; grid-template-columns: 1fr; gap: 12px; }
        .group-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 18px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; text-align: left; }
        .group-btn:active { transform: scale(0.97); }
        .group-btn.locked { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }
        .g-title { font-size: 1.05rem; font-weight: bold; color: var(--text-main); }
        .g-status { font-size: 0.8rem; background: rgba(203, 163, 122, 0.15); color: var(--accent-gold); padding: 4px 10px; border-radius: 10px; font-weight: bold; }

        /* --- 階段一：定心吸收 --- */
        #absorb-screen { flex: 1; padding: 20px; overflow-y: auto; display: none; flex-direction: column; align-items: center; }
        .word-list-card { width: 100%; max-width: 500px; background: var(--glass-bg); border-radius: 20px; padding: 10px 20px; margin-bottom: 20px;}
        .absorb-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(203,163,122,0.15); }
        .absorb-word { font-weight: bold; font-size: 1.25rem; color: var(--accent-jade); margin-bottom: 4px; }
        .absorb-meaning { font-size: 0.95rem; color: var(--text-main); margin-bottom: 4px;}
        .absorb-root { font-size: 0.8rem; color: var(--accent-gold); }
        .audio-btn { padding: 6px 12px; border-radius: 12px; border: 1px solid rgba(203,163,122,0.4); background: rgba(203,163,122,0.1); color: var(--accent-gold); font-weight: bold; cursor: pointer; }

        /* --- 階段二：測驗畫面 --- */
        #test-screen { flex: 1; display: none; flex-direction: column; align-items: center; position: relative; width: 100%; overflow: hidden; }
        .spirit-stage { height: 230px; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; margin-top: 10px; }
        #stickman-svg { width: 180px; height: 220px; transition: 0.5s; z-index: 5; animation: float 3s infinite ease-in-out;}
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .s-line { fill: none; stroke: var(--accent-jade); stroke-width: 5; stroke-linecap: round; }
        .s-fill { fill: #fff; stroke: var(--accent-jade); stroke-width: 5; }
        .part { opacity: 0; transition: 0.5s; } .visible { opacity: 1 !important; }
        #rocket { opacity: 0; transition: 0.8s; } .rocket-active #rocket { opacity: 1; transform: translateY(-50px); }
        .liftoff { animation: liftoffAnim 2s forwards cubic-bezier(0.4, 0, 1, 1); }
        @keyframes liftoffAnim { 0% { transform: translateY(0); } 100% { transform: translateY(-1000px); } }

        .wisdom-eye-btn { position: absolute; top: 10px; right: 20px; background: rgba(203,163,122,0.15); border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 5px; z-index: 20;}
        #cheat-overlay { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: var(--accent-gold); padding: 10px 30px; border-radius: 15px; font-size: 2rem; font-weight: bold; z-index: 50; display: none; letter-spacing: 3px; }

        .word-test-area { margin-top: 5px; text-align: center; }
        .letter-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; padding: 0 15px;}
        .letter-dash { width: 30px; height: 40px; border-bottom: 3px solid var(--text-light); font-size: 1.5rem; font-weight: bold; display: flex; align-items: flex-end; justify-content: center; text-transform: uppercase; color: var(--text-main); }
        .letter-dash.error-reveal { color: var(--accent-rose); border-bottom-color: var(--accent-rose); }

        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; padding: 0 12px 20px; max-width: 600px; }
        .key { width: calc(10% - 6px); height: 45px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; font-weight: 500; font-size: 1.1rem; color: var(--text-main); cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .key.correct { background: var(--accent-jade); color: white; border-color: var(--accent-jade); pointer-events: none; }
        .key.wrong { background: rgba(207, 164, 164, 0.2); opacity: 0.5; pointer-events: none; border-color: transparent;}

        .vajra-btn { width: 90%; max-width: 320px; padding: 18px; background: var(--accent-gold); color: white; border: none; border-radius: 20px; font-size: 1.1rem; font-weight: 500; letter-spacing: 2px; cursor: pointer; margin: 20px 0; transition: 0.3s;}
        
        #result-screen { flex: 1; display: none; flex-direction: column; align-items: center; padding: 30px 20px; text-align: center; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <div class="back-btn" onclick="goBackOrExit()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>返回
    </div>
    <div id="header-title" style="font-weight:bold; color:var(--text-main);">選擇修煉群組</div>
    <div class="timer-badge" id="global-timer"></div>
</header>

<div id="level-select-screen">
    <div class="lock-banner" id="lock-banner">今日修煉已圓滿。<br>智慧需時發酵，請明日再來挑戰新單字。</div>
    <div class="section-title">高中 7000 單字修煉</div>
    <div class="grid-container" id="senior-grid"></div>
    <div class="section-title">托福高階無礙</div>
    <div class="grid-container" id="toefl-grid"></div>
</div>

<div id="absorb-screen">
    <div class="word-list-card" id="word-list-container"></div>
    <button class="vajra-btn" onclick="startTest()">開始盲測考驗</button>
</div>

<div id="test-screen">
    <button class="wisdom-eye-btn" onclick="useCheatEye()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg> 慧眼
    </button>
    <div id="cheat-overlay"></div>

    <div class="spirit-stage" id="spirit-stage">
        <svg id="stickman-svg" viewBox="0 0 200 240" onclick="playCurrentWordAudio()">
            <g id="rocket"><path d="M100 150 L80 190 L120 190 Z" fill="#fff" stroke="var(--accent-gold)" stroke-width="4"/><rect x="85" y="190" width="30" height="20" fill="var(--accent-gold)"/></g>
            <g id="s-body" class="part"><rect x="85" y="100" width="30" height="50" rx="5" class="s-fill"/></g>
            <g id="s-head" class="part"><rect x="75" y="40" width="50" height="50" rx="10" class="s-fill"/><circle cx="90" cy="60" r="3" fill="#333"/><circle cx="110" cy="60" r="3" fill="#333"/><path d="M 90 75 Q 100 85 110 75" fill="none" stroke="#333" stroke-width="2" id="s-mouth"/></g>
            <g id="s-arms" class="part"><path d="M85 110 L60 130 M115 110 L140 130" class="s-line"/></g>
            <g id="s-legs" class="part"><path d="M90 150 L80 180 M110 150 L120 180" class="s-line"/></g>
        </svg>
    </div>
    
    <div class="word-test-area">
        <div style="color:var(--accent-gold); margin-bottom:5px; font-size:0.8rem;">(點擊火柴人可再次聆聽發音)</div>
        <div class="letter-row" id="letter-row"></div>
    </div>
    <div class="keyboard" id="keyboard"></div>
</div>

<div id="result-screen">
    <h1 style="color:var(--accent-jade);">修煉圓滿</h1>
    <p id="result-desc"></p>
    <button class="vajra-btn" onclick="window.location.href='index.html'">返回大廳</button>
</div>

<script>
window.sysUtterances = [];
let currentWords = []; let currentStep = -1; let testIndex = 0; 
let mistakes = 0; let guessedLetters = new Set(); let correctCount = 0; let usedCheat = false;
let globalTimerInterval;

// 初始化選關大廳
function initLevelSelect() {
    currentStep = -1;
    const d = new Date();
    const todayStr = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const isLocked = (localStorage.getItem('prajna_last_completed_date') === todayStr);
    
    if(isLocked) document.getElementById('lock-banner').style.display = 'block';

    function renderGrid(containerId, category) {
        const grid = document.getElementById(containerId);
        grid.innerHTML = '';
        if(QuestionBank[category]) {
            QuestionBank[category].forEach(group => {
                const btn = document.createElement('div');
                btn.className = `group-btn ${isLocked ? 'locked' : ''}`;
                btn.innerHTML = `<span class="g-title">${group.title}</span><span class="g-status">任務</span>`;
                btn.onclick = () => { currentWords = group.words; initAbsorb(); };
                grid.appendChild(btn);
            });
        }
    }
    renderGrid('senior-grid', 'senior');
    renderGrid('toefl-grid', 'toefl');
}

// 頂部返回按鈕邏輯
function goBackOrExit() {
    if (currentStep === -1 || currentStep === 2) window.location.href = 'index.html'; // 在選單或結算，回首頁
    else {
        // 在吸收或測驗中，退回選單
        clearInterval(globalTimerInterval);
        document.getElementById('absorb-screen').style.display = 'none';
        document.getElementById('test-screen').style.display = 'none';
        document.getElementById('level-select-screen').style.display = 'flex';
        document.getElementById('header-title').innerText = "選擇修煉群組";
        document.getElementById('global-timer').innerText = "";
        currentStep = -1;
    }
}

function initAbsorb() {
    currentStep = 0;
    document.getElementById('level-select-screen').style.display = 'none';
    document.getElementById('absorb-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "定心吸收";
    
    document.getElementById('word-list-container').innerHTML = currentWords.map(w => `
        <div class="absorb-item">
            <div style="flex:1;">
                <div class="absorb-word">${w.word}</div>
                <div class="absorb-meaning">${w.meaning}</div>
                <div class="absorb-root">${w.root || ''}</div>
            </div>
            <button class="audio-btn" onclick="speak('${w.word}')">聽發音</button>
        </div>
    `).join('');
    
    let timeLeft = 600;
    const timerEl = document.getElementById('global-timer');
    globalTimerInterval = setInterval(() => {
        if (currentStep !== 0) { clearInterval(globalTimerInterval); return; }
        if (timeLeft <= 0) { startTest(); return; }
        timeLeft--;
        timerEl.innerText = `${Math.floor(timeLeft / 60)}:${timeLeft % 60 < 10 ? '0' : ''}${timeLeft % 60}`;
    }, 1000);
}

function startTest() {
    currentStep = 1; clearInterval(globalTimerInterval);
    document.getElementById('absorb-screen').style.display = 'none';
    document.getElementById('test-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "天籟盲測";
    document.getElementById('global-timer').innerText = "";
    testIndex = 0; correctCount = 0;
    loadWordTest();
}

function loadWordTest() {
    if (testIndex >= currentWords.length) { showFinalResult(); return; }
    guessedLetters.clear(); mistakes = 0; usedCheat = false;
    document.querySelectorAll('.part').forEach(p => p.classList.remove('visible'));
    document.getElementById('spirit-stage').classList.remove('rocket-active', 'liftoff');
    
    const wordObj = currentWords[testIndex];
    document.getElementById('letter-row').innerHTML = wordObj.word.split('').map(() => `<div class="letter-dash"></div>`).join('');
    
    initKeyboard();
    setTimeout(() => { playCurrentWordAudio(); }, 500);
}

function useCheatEye() {
    if(usedCheat) return;
    usedCheat = true;
    const overlay = document.getElementById('cheat-overlay');
    overlay.innerText = currentWords[testIndex].word.toUpperCase();
    overlay.style.display = 'block';
    setTimeout(() => { overlay.style.display = 'none'; }, 800);
}

function handleGuess(letter, btn) {
    const word = currentWords[testIndex].word.toUpperCase();
    if (word.includes(letter)) {
        guessedLetters.add(letter); btn.classList.add('correct');
        updateDashes(); updateStickman();
        if (word.split('').every(l => guessedLetters.has(l))) {
            if(!usedCheat) correctCount++; 
            triggerWin();
        }
    } else {
        mistakes++; btn.classList.add('wrong');
        document.getElementById('stickman-svg').style.transform = "translateX(10px)";
        setTimeout(() => document.getElementById('stickman-svg').style.transform = "translateX(0)", 200);
        if (mistakes >= 5) revealAnswer();
    }
}

function updateDashes() {
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    word.split('').forEach((char, i) => { if (guessedLetters.has(char)) dashes[i].innerText = char; });
}

function updateStickman() {
    const progress = guessedLetters.size / new Set(currentWords[testIndex].word.toUpperCase().split('')).size;
    if (progress > 0) document.getElementById('s-body').classList.add('visible');
    if (progress > 0.3) document.getElementById('s-head').classList.add('visible');
    if (progress > 0.6) document.getElementById('s-arms').classList.add('visible');
    if (progress > 0.8) document.getElementById('s-legs').classList.add('visible');
}

function triggerWin() {
    document.querySelectorAll('.part').forEach(p => p.classList.add('visible'));
    document.getElementById('keyboard').style.pointerEvents = 'none';
    if(!usedCheat) {
        document.getElementById('spirit-stage').classList.add('rocket-active');
        setTimeout(() => { document.getElementById('spirit-stage').classList.add('liftoff'); playCurrentWordAudio(); setTimeout(() => { testIndex++; loadWordTest(); }, 1800); }, 800);
    } else {
        playCurrentWordAudio(); setTimeout(() => { testIndex++; loadWordTest(); }, 1200);
    }
}

function revealAnswer() {
    const word = currentWords[testIndex].word.toUpperCase();
    const dashes = document.querySelectorAll('.letter-dash');
    document.getElementById('keyboard').style.pointerEvents = 'none';
    word.split('').forEach((char, i) => { if (!guessedLetters.has(char)) { dashes[i].innerText = char; dashes[i].classList.add('error-reveal'); } });
    playCurrentWordAudio(); setTimeout(() => { testIndex++; loadWordTest(); }, 2000);
}

function showFinalResult() {
    currentStep = 2;
    document.getElementById('test-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('header-title').innerText = "結算";
    document.getElementById('result-desc').innerHTML = `恭喜完成！<br>真實化生升空數：<b style="color:var(--accent-jade);">${correctCount}</b> / ${currentWords.length}`;
    
    const d = new Date();
    localStorage.setItem('prajna_last_completed_date', `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`);
}

function playCurrentWordAudio() { speak(currentWords[testIndex].word); }
function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text); msg.lang = 'en-US'; msg.rate = 0.85; 
    let isAndroid = /Android/i.test(navigator.userAgent);
    if (isAndroid) {
        window.sysUtterances.push(msg);
        let voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) { let enVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || voices.find(v => v.lang.includes('en')); if (enVoice) msg.voice = enVoice; }
    }
    msg.onend = () => { if(isAndroid) window.sysUtterances = window.sysUtterances.filter(u => u !== msg); };
    setTimeout(() => { window.speechSynthesis.speak(msg); }, isAndroid ? 150 : 50);
}

function initKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = 'QWERTYUIOPASDFGHJKLZXCVBNM'.split('').map(l => `<button class="key" onclick="handleGuess('${l}', this)">${l}</button>`).join('');
    kb.style.pointerEvents = 'auto';
}

if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); }; }

window.onload = initLevelSelect;
</script>
</body>
</html>

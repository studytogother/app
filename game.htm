<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>化生單字測驗 - 般若學習系統</title>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; 
            --text-light: #968E86;
            --accent-gold: #CBA37A; 
            --accent-jade: #82968C; 
            --accent-rose: #CFA4A4; 
            --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.12);
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100dvh; 
            background: var(--bg-gradient); color: var(--text-main); 
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; align-items: center; 
        }

        /* --- 頂部導航與能量條 --- */
        header {
            width: 100%; max-width: 600px;
            padding: max(15px, env(safe-area-inset-top)) 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: var(--accent-jade); text-decoration: none; font-size: 0.95rem; font-weight: 500;
            background: var(--glass-bg); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: all 0.3s;
        }
        .back-btn:active { transform: scale(0.95); background: #fff; }

        .energy-box { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--accent-rose); font-weight: bold; }
        .energy-dots { display: flex; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-rose); transition: all 0.3s; }
        .dot.lost { background: rgba(207, 164, 164, 0.3); transform: scale(0.8); }

        /* --- 智靈 (化生精靈) 動畫區 --- */
        .spirit-container {
            flex: 1; width: 100%; max-width: 600px; 
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        #prajna-spirit {
            width: 180px; height: 220px;
            transition: all 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            filter: drop-shadow(0 10px 20px rgba(203, 163, 122, 0.1));
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        
        /* 升空發光動畫 */
        .ascend {
            transform: translateY(-40px) scale(1.1) !important;
            filter: drop-shadow(0 0 30px rgba(203, 163, 122, 0.8)) drop-shadow(0 0 60px rgba(203, 163, 122, 0.4)) !important;
            animation: none !important;
        }

        /* SVG 身體部位預設隱藏 */
        .part { opacity: 0; transition: opacity 0.8s ease, transform 0.8s ease; transform: translateY(10px); }
        .part.visible { opacity: 1; transform: translateY(0); }
        
        .s-line { fill: none; stroke: var(--accent-gold); stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
        .s-fill { fill: #fff; stroke: var(--accent-gold); stroke-width: 4; }
        .s-eye { fill: var(--text-main); }
        .core-light { fill: var(--accent-gold); opacity: 0.3; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { r: 8; opacity: 0.3; } 50% { r: 12; opacity: 0.6; } }

        /* --- 單字填空區 --- */
        .word-display {
            display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
            margin-bottom: 25px; padding: 0 20px;
        }
        .letter-box {
            width: 36px; height: 45px;
            border-bottom: 3px solid var(--text-light);
            display: flex; justify-content: center; align-items: flex-end;
            font-size: 1.8rem; font-weight: bold; color: var(--text-main);
            text-transform: uppercase; padding-bottom: 5px;
            transition: all 0.3s;
        }
        .letter-box.revealed { border-bottom-color: var(--accent-jade); color: var(--accent-jade); }
        .letter-box.missed { border-bottom-color: var(--accent-rose); color: var(--accent-rose); }

        /* --- 琉璃鍵盤區 --- */
        .keyboard {
            width: 100%; max-width: 600px; padding: 0 15px 30px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
        }
        .key-btn {
            width: calc(10% - 8px); min-width: 32px; height: 45px;
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 10px;
            font-size: 1.1rem; font-weight: 500; color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: center; align-items: center;
        }
        .key-btn:active { transform: scale(0.9); }
        .key-btn.correct { background: var(--accent-jade); color: #fff; border-color: var(--accent-jade); pointer-events: none; }
        .key-btn.wrong { background: rgba(207, 164, 164, 0.2); color: rgba(88, 80, 74, 0.4); border-color: transparent; pointer-events: none; box-shadow: none; }

        /* --- 結果彈窗 (中英文解釋與發音) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(245, 242, 239, 0.8); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center; z-index: 100;
            opacity: 0; pointer-events: none; transition: opacity 0.4s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        
        .result-card {
            background: rgba(255, 255, 255, 0.95); width: 85%; max-width: 360px;
            border-radius: 24px; padding: 30px 25px; text-align: center;
            box-shadow: 0 15px 40px rgba(203, 163, 122, 0.2); border: 1px solid var(--glass-border);
            transform: translateY(20px); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .modal-overlay.show .result-card { transform: translateY(0); }

        .r-word { font-size: 2rem; font-weight: bold; color: var(--accent-gold); letter-spacing: 2px; margin-bottom: 5px; text-transform: capitalize; }
        .r-phonetic { font-size: 0.95rem; color: var(--text-light); margin-bottom: 20px; }
        .r-meaning { font-size: 1.1rem; color: var(--text-main); line-height: 1.6; margin-bottom: 25px; padding: 15px; background: rgba(203, 163, 122, 0.05); border-radius: 12px; }

        .btn-group { display: flex; gap: 12px; justify-content: center; }
        .action-btn {
            flex: 1; padding: 12px 0; border-radius: 16px; font-size: 1rem; font-weight: 500; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; border: none;
        }
        .btn-audio { background: rgba(203, 163, 122, 0.15); color: var(--accent-gold); border: 1px solid rgba(203, 163, 122, 0.3); }
        .btn-audio:active { background: rgba(203, 163, 122, 0.3); }
        .btn-next { background: var(--accent-jade); color: #fff; box-shadow: 0 4px 15px rgba(130, 150, 140, 0.3); }
        .btn-next:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            回大廳
        </a>
        <div class="energy-box">
            光之能量
            <div class="energy-dots" id="energy-container">
                </div>
        </div>
    </header>

    <div class="spirit-container">
        <svg id="prajna-spirit" viewBox="0 0 200 220">
            <circle cx="100" cy="110" r="8" class="core-light" />
            
            <g id="part-head" class="part">
                <circle cx="100" cy="60" r="35" class="s-fill" />
                <circle cx="88" cy="55" r="4" class="s-eye" />
                <circle cx="112" cy="55" r="4" class="s-eye" />
                <path d="M 92 68 Q 100 75 108 68" class="s-line" fill="none" stroke-width="3" />
            </g>

            <g id="part-body" class="part">
                <path d="M 100 95 L 100 150" class="s-line" stroke-width="6" />
                <circle cx="100" cy="122" r="18" class="s-fill" stroke-width="2" /> </g>

            <g id="part-arms" class="part">
                <path d="M 100 110 Q 70 100 60 130" class="s-line" />
                <path d="M 100 110 Q 130 100 140 130" class="s-line" />
            </g>

            <g id="part-legs" class="part">
                <path d="M 100 150 Q 80 170 85 195" class="s-line" />
                <path d="M 100 150 Q 120 170 115 195" class="s-line" />
            </g>
        </svg>
    </div>

    <div class="word-display" id="word-display">
        </div>

    <div class="keyboard" id="keyboard">
        </div>

    <div class="modal-overlay" id="result-modal">
        <div class="result-card">
            <div id="r-status-text" style="font-size: 0.9rem; font-weight:bold; letter-spacing:2px; margin-bottom:15px;"></div>
            <div class="r-word" id="r-word">COMPASSION</div>
            <div class="r-phonetic" id="r-phonetic">/kəmˈpæʃ.ən/</div>
            <div class="r-meaning" id="r-meaning">n. 慈悲；同情；憐憫</div>
            
            <div class="btn-group">
                <button class="action-btn btn-audio" onclick="playPronunciation()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                    聆聽發音
                </button>
                <button class="action-btn btn-next" onclick="startNewWord()">下一題</button>
            </div>
        </div>
    </div>

<script>
    // ==========================================
    // 獨立題庫 (未來可與 question_bank.js 整合)
    // 此處先內建 7000 單字表的中高難度詞彙供測試
    // ==========================================
    const vocabList = [
        { word: "compassion", phonetic: "/kəmˈpæʃ.ən/", meaning: "n. 慈悲；同情；憐憫" },
        { word: "profound", phonetic: "/prəˈfaʊnd/", meaning: "adj. 深刻的；深奧的" },
        { word: "essential", phonetic: "/ɪˈsen.ʃəl/", meaning: "adj. 必要的；不可或缺的" },
        { word: "humble", phonetic: "/ˈhʌm.bəl/", meaning: "adj. 謙卑的；虛心的" },
        { 
            word: "wisdom", phonetic: "/ˈwɪz.dəm/", meaning: "n. 智慧；明智" },
        { word: "harmony", phonetic: "/ˈhɑːr.mə.ni/", meaning: "n. 和諧；融洽" },
        { word: "resilient", phonetic: "/rɪˈzɪl.jənt/", meaning: "adj. 有韌性的；能迅速恢復的" }
    ];

    let currentWordObj = null;
    let targetWord = "";
    let guessedLetters = new Set();
    let uniqueLetters = new Set();
    let mistakes = 0;
    const MAX_MISTAKES = 6;

    // TTS 語音相關變數 (防 Android 垃圾回收)
    window.sysUtterances = []; 

    // 初始化鍵盤
    function initKeyboard() {
        const keyboard = document.getElementById('keyboard');
        keyboard.innerHTML = '';
        const layout = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');
        
        layout.forEach(letter => {
            const btn = document.createElement('button');
            btn.className = 'key-btn';
            btn.innerText = letter;
            btn.onclick = () => handleGuess(letter, btn);
            keyboard.appendChild(btn);
        });
    }

    // 更新能量條
    function updateEnergy() {
        const container = document.getElementById('energy-container');
        container.innerHTML = '';
        for(let i = 0; i < MAX_MISTAKES; i++) {
            const dot = document.createElement('div');
            dot.className = `dot ${i < mistakes ? 'lost' : ''}`;
            container.appendChild(dot);
        }
    }

    // 開始新單字
    function startNewWord() {
        document.getElementById('result-modal').classList.remove('show');
        document.getElementById('prajna-spirit').classList.remove('ascend');
        
        // 隨機抽選單字
        currentWordObj = vocabList[Math.floor(Math.random() * vocabList.length)];
        targetWord = currentWordObj.word.toUpperCase();
        
        guessedLetters.clear();
        uniqueLetters = new Set(targetWord.split(''));
        mistakes = 0;
        
        // 重置 UI
        updateEnergy();
        initKeyboard();
        
        // 重置精靈狀態 (全隱藏)
        document.querySelectorAll('.part').forEach(p => p.classList.remove('visible'));
        
        renderWordDisplay();
    }

    // 渲染單字底線區
    function renderWordDisplay() {
        const display = document.getElementById('word-display');
        display.innerHTML = '';
        
        targetWord.split('').forEach(char => {
            const box = document.createElement('div');
            box.className = 'letter-box';
            if (guessedLetters.has(char)) {
                box.innerText = char;
                box.classList.add('revealed');
            } else if (mistakes >= MAX_MISTAKES) {
                // 失敗時顯示未猜出的紅色字母
                box.innerText = char;
                box.classList.add('missed');
            } else {
                box.innerText = '';
            }
            display.appendChild(box);
        });
    }

    // 處理字母點擊
    function handleGuess(letter, btnNode) {
        if (guessedLetters.has(letter) || mistakes >= MAX_MISTAKES) return;

        if (uniqueLetters.has(letter)) {
            // 猜對了！
            guessedLetters.add(letter);
            btnNode.classList.add('correct');
            updateSpiritStage();
            renderWordDisplay();
            checkWinStatus();
        } else {
            // 猜錯了
            mistakes++;
            btnNode.classList.add('wrong');
            updateEnergy();
            checkWinStatus();
        }
    }

    // 根據猜對的比例，讓精靈長出器官 (正向回饋核心)
    function updateSpiritStage() {
        const progress = guessedLetters.size / uniqueLetters.size;
        
        if (progress > 0) document.getElementById('part-head').classList.add('visible');
        if (progress > 0.3) document.getElementById('part-body').classList.add('visible');
        if (progress > 0.6) document.getElementById('part-arms').classList.add('visible');
        if (progress > 0.8) document.getElementById('part-legs').classList.add('visible');
    }

    // 檢查輸贏
    function checkWinStatus() {
        if (guessedLetters.size === uniqueLetters.size) {
            // 獲勝：完全化生，發光升空
            document.getElementById('part-legs').classList.add('visible'); // 確保手腳都長齊
            setTimeout(() => {
                document.getElementById('prajna-spirit').classList.add('ascend');
                showResult(true);
            }, 600);
        } else if (mistakes >= MAX_MISTAKES) {
            // 失敗：能量耗盡，溫和提示
            renderWordDisplay(); // 顯示紅色正確答案
            setTimeout(() => { showResult(false); }, 1000);
        }
    }

    // 顯示結果彈窗
    function showResult(isWin) {
        document.getElementById('r-word').innerText = currentWordObj.word;
        document.getElementById('r-phonetic').innerText = currentWordObj.phonetic;
        document.getElementById('r-meaning').innerText = currentWordObj.meaning;
        
        const statusText = document.getElementById('r-status-text');
        if(isWin) {
            statusText.innerText = "圓滿化生！";
            statusText.style.color = "var(--accent-jade)";
        } else {
            statusText.innerText = "重新凝聚光芒";
            statusText.style.color = "var(--accent-rose)";
        }

        document.getElementById('result-modal').classList.add('show');
        
        // 自動唸出單字發音
        setTimeout(playPronunciation, 300);
    }

    // ==========================================
    // 語音引擎 (TTS) - 完美移植妳的雙平台防漏音邏輯
    // ==========================================
    function playPronunciation() {
        if (!window.speechSynthesis) return alert("您的設備不支援語音功能");
        
        window.speechSynthesis.cancel();
        
        let utterance = new SpeechSynthesisUtterance(currentWordObj.word);
        utterance.lang = 'en-US'; // 英文發音
        utterance.rate = 0.9;     // 稍微放慢一點讓學生聽清楚

        let isAndroid = /Android/i.test(navigator.userAgent);
        
        if (isAndroid) {
            window.sysUtterances.push(utterance);
            let voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                let enVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) || voices.find(v => v.lang.includes('en'));
                if (enVoice) utterance.voice = enVoice;
            }
        }

        utterance.onend = () => {
            if(isAndroid) window.sysUtterances = window.sysUtterances.filter(u => u !== utterance);
        };
        
        setTimeout(() => { window.speechSynthesis.speak(utterance); }, isAndroid ? 150 : 50);
    }

    // 確保語音庫載入
    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };
    }

    // 啟動系統
    window.onload = startNewWord;

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>般若語言法界 ． 清淨學習</title>
    
    <style>
        :root {
            /* 全新色調：淨透水藍與琉璃紫風 */
            --bg-gradient: linear-gradient(135deg, #F0F8FF, #E6E6FA);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(200, 200, 255, 0.9);
            --glass-shadow: 0 10px 40px rgba(150, 150, 200, 0.15);
            --text-main: #4A4A6A; --text-light: #8A8AAB;
            --accent-blue: #87CEFA; --accent-purple: #9370DB; --accent-teal: #7FFFD4; --accent-indigo: #4B0082;
            --shadow-soft: 0 10px 40px rgba(100, 100, 150, 0.1);
        }

        * { 
            box-sizing: border-box; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; 
            background: var(--bg-gradient); color: var(--text-main); 
            font-family: -apple-system, sans-serif; overflow-x: hidden; 
            -webkit-user-select: none; user-select: none; 
            display: flex; flex-direction: column; align-items: center; 
        }

        /* --- 頂部導航 --- */
        .top-nav { width: 100%; padding: max(15px, env(safe-area-inset-top)) 20px 15px; display: flex; justify-content: center; background: transparent; z-index: 10; }
        .nav-content { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); color: var(--text-main); box-shadow: var(--shadow-soft); cursor: pointer; transition: all 0.2s; }
        .nav-btn:active { transform: scale(0.92); background: rgba(240,248,255,0.9); }
        .nav-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* --- 大廳核心區 --- */
        .hero-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; max-width: 720px; padding: 0 20px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 呼吸發光藍紫蓮花 */
        .taichi-logo { width: 140px; height: 140px; border-radius: 50%; background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(230,230,250,0.5)); border: 1px solid var(--glass-border); box-shadow: 0 15px 45px rgba(150, 150, 200, 0.2), inset 0 0 20px rgba(100, 100, 255, 0.05); display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 30px; animation: floatLogo 4s infinite ease-in-out; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); box-shadow: 0 15px 45px rgba(150, 150, 200, 0.2); } 50% { transform: translateY(-10px); box-shadow: 0 25px 55px rgba(150, 150, 200, 0.3); } }
        
        .taichi-logo::after { content: ''; position: absolute; width: 90px; height: 90px; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 90 C 110 70, 100 20, 70 45 C 60 50, 50 65, 50 90' stroke='%2387CEFA' fill='none' stroke-width='1.5'/%3E%3Cpath d='M50 90 C -10 70, 0 20, 30 45 C 40 50, 50 65, 50 90' stroke='%2387CEFA' fill='none' stroke-width='1.5'/%3E%3Cpath d='M50 85 C 80 50, 70 10, 55 30 C 52 40, 50 55, 50 85' stroke='%239370DB' fill='none' stroke-width='2'/%3E%3Cpath d='M50 85 C 20 50, 30 10, 45 30 C 48 40, 50 55, 50 85' stroke='%239370DB' fill='none' stroke-width='2'/%3E%3Cpath d='M50 85 C 65 45, 60 5, 50 20 C 40 5, 35 45, 50 85' stroke='%237FFFD4' fill='none' stroke-width='2.5'/%3E%3C/svg%3E"); background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.8; }

        .sys-title { font-size: 2.2rem; font-weight: 300; letter-spacing: 6px; color: var(--text-main); margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.02); }
        .sys-subtitle { font-size: 0.95rem; color: var(--text-light); letter-spacing: 3px; font-weight: 300; margin-bottom: 30px; }

        /* 說明按鈕調色 */
        .readme-btn { display: flex; align-items: center; gap: 8px; padding: 8px 24px; background: rgba(255,255,255,0.7); border: 1px solid var(--accent-purple); border-radius: 20px; color: var(--accent-purple); font-size: 0.85rem; font-weight: 500; letter-spacing: 2px; cursor: pointer; box-shadow: 0 4px 15px rgba(150, 100, 200, 0.15); transition: all 0.3s; margin-bottom: 30px; }
        .readme-btn:active { transform: scale(0.95); background: var(--accent-purple); color: white; }
        .readme-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* --- 法界傳送門 --- */
        .portal-grid { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .portal-btn { background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); border-radius: 24px; padding: 25px 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; -webkit-backface-visibility: hidden; backface-visibility: hidden; text-decoration: none;}
        .portal-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.8), transparent); opacity: 0; transition: opacity 0.3s; }
        .portal-btn:active { transform: scale(0.96); }
        .portal-btn:active::before { opacity: 1; }
        
        .portal-icon { width: 36px; height: 36px; stroke-width: 1.2; fill: none; margin-bottom: 5px; transition: transform 0.3s; }
        .portal-btn:active .portal-icon { transform: translateY(-3px); }
        
        .portal-name { font-size: 1rem; font-weight: 500; letter-spacing: 2px; color: var(--text-main); }
        .portal-desc { font-size: 0.75rem; color: var(--text-light); letter-spacing: 1px; }

        /* 各入口專屬高亮色 */
        .btn-vocab .portal-icon { stroke: var(--accent-blue); }
        .btn-vocab:active { border-color: var(--accent-blue); box-shadow: 0 8px 25px rgba(135, 206, 250, 0.3); }
        .btn-senior .portal-icon { stroke: var(--accent-teal); }
        .btn-senior:active { border-color: var(--accent-teal); box-shadow: 0 8px 25px rgba(127, 255, 212, 0.3); }
        .btn-toefl .portal-icon { stroke: var(--accent-purple); }
        .btn-toefl:active { border-color: var(--accent-purple); box-shadow: 0 8px 25px rgba(147, 112, 219, 0.3); }
        .btn-toeic .portal-icon { stroke: var(--accent-indigo); }
        .btn-toeic:active { border-color: var(--accent-indigo); box-shadow: 0 8px 25px rgba(75, 0, 130, 0.3); }

        .footer-text { margin-top: 40px; margin-bottom: 20px; font-size: 0.75rem; color: var(--text-light); letter-spacing: 2px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: color 0.3s; }
        .footer-text:active { color: var(--accent-purple); }

    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-content">
            <div class="nav-btn">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div class="nav-btn">
                    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                </div>
            </div>
        </div>
    </div>

    <div class="hero-section">
        <div class="taichi-logo"></div>
        <div class="sys-title">般若語言法界</div>
        <div class="sys-subtitle">清淨無礙的學習淨土</div>

        <div class="readme-btn">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            說明與指南
        </div>

        <div class="portal-grid">
            <a href="game.html" class="portal-btn btn-vocab">
                <svg class="portal-icon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                <div class="portal-name">化生單字</div>
                <div class="portal-desc">單字記憶修行</div>
            </a>
            <a href="exam.html" class="portal-btn btn-senior">
                <svg class="portal-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <div class="portal-name">高中模考</div>
                <div class="portal-desc">全真模擬測驗</div>
            </a>
            <a href="exam_toefl.html" class="portal-btn btn-toefl">
                <svg class="portal-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <div class="portal-name">托福考場</div>
                <div class="portal-desc">適性出國檢定</div>
            </a>
            <a href="exam_toeic.html" class="portal-btn btn-toeic">
                <svg class="portal-icon" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                <div class="portal-name">多益實戰</div>
                <div class="portal-desc">職場商務英語</div>
            </a>
        </div> 

        <div class="footer-text">
            <span style="display: flex; align-items: center; gap: 6px;">
                <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg> 彌陀淨土系統 衍生共建
            </span>
        </div>

    </div>
</body>
</html>

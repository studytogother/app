<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>般若學習系統 - 大廳</title>
    <script src="question_bank.js?v=4"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; --text-light: #968E86;
            --accent-gold: #CBA37A; --accent-jade: #82968C; --accent-rose: #CFA4A4;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100dvh; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; overflow-y: auto;}
        
        header { width: 100%; max-width: 600px; padding: 30px 20px 10px; text-align: center; }
        .sys-title { font-size: 1.8rem; font-weight: 300; letter-spacing: 4px; color: var(--text-main); margin-bottom: 5px; }
        .sys-subtitle { font-size: 0.9rem; color: var(--text-light); letter-spacing: 2px; }

        .lock-banner { background: rgba(207, 164, 164, 0.15); border: 1px solid var(--accent-rose); color: var(--accent-rose); padding: 12px 20px; border-radius: 12px; font-size: 0.95rem; font-weight: bold; text-align: center; margin: 20px 0; display: none; width: 90%; max-width: 500px;}

        .module-section { width: 100%; max-width: 600px; padding: 20px; }
        .section-title { font-size: 1.1rem; color: var(--accent-jade); border-bottom: 2px solid rgba(130, 150, 140, 0.2); padding-bottom: 8px; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px;}
        
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .group-btn { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 18px 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: left; }
        .group-btn:active { transform: scale(0.97); }
        .group-btn:hover { border-color: var(--accent-gold); }
        .group-btn.locked { opacity: 0.6; pointer-events: none; filter: grayscale(100%); }
        
        .g-title { font-size: 1.05rem; font-weight: bold; color: var(--text-main); }
        .g-status { font-size: 0.8rem; background: rgba(203, 163, 122, 0.15); color: var(--accent-gold); padding: 4px 10px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="sys-title">般若語言法界</div>
        <div class="sys-subtitle">每日十分鐘，點亮智慧光芒</div>
    </header>

    <div class="lock-banner" id="lock-banner">
        今日修煉已圓滿。<br>智慧需時發酵，請明日再來挑戰新單字。
    </div>

    <div class="module-section">
        <div class="section-title">高中 7000 單字修煉</div>
        <div class="grid-container" id="senior-grid"></div>
    </div>

    <div class="module-section">
        <div class="section-title">托福高階無礙</div>
        <div class="grid-container" id="toefl-grid"></div>
    </div>

<script>
    // 取得今天的日期字串 (YYYY-MM-DD)
    function getTodayString() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function checkDailyLock() {
        const lastDate = localStorage.getItem('prajna_last_completed_date');
        const isLocked = (lastDate === getTodayString());
        
        if(isLocked) {
            document.getElementById('lock-banner').style.display = 'block';
        }
        return isLocked;
    }

    function renderGroups() {
        const isLocked = checkDailyLock();
        
        const seniorGrid = document.getElementById('senior-grid');
        QuestionBank.senior.forEach(group => {
            const btn = document.createElement('button');
            btn.className = `group-btn ${isLocked ? 'locked' : ''}`;
            btn.innerHTML = `<span class="g-title">${group.title}</span><span class="g-status">新任務</span>`;
            btn.onclick = () => startGame('senior', group.id);
            seniorGrid.appendChild(btn);
        });

        const toeflGrid = document.getElementById('toefl-grid');
        QuestionBank.toefl.forEach(group => {
            const btn = document.createElement('button');
            btn.className = `group-btn ${isLocked ? 'locked' : ''}`;
            btn.innerHTML = `<span class="g-title">${group.title}</span><span class="g-status">挑戰</span>`;
            btn.onclick = () => startGame('toefl', group.id);
            toeflGrid.appendChild(btn);
        });
    }

    function startGame(category, groupId) {
        // 記錄玩家選了哪一組，讓 game.html 去讀取
        localStorage.setItem('prajna_current_category', category);
        localStorage.setItem('prajna_current_group', groupId);
        window.location.href = 'game.html';
    }

    window.onload = renderGroups;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>般若學習系統 - Study Together</title>
    
    <style>
        :root {
            /* 淨息流主色系 */
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.9);
            --text-main: #58504A; 
            --text-light: #968E86;
            --accent-gold: #CBA37A; 
            --accent-jade: #82968C; 
            --accent-rose: #CFA4A4; 
            --accent-amber: #C1A583;
            --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.12);
        }

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100dvh; 
            background: var(--bg-gradient); color: var(--text-main); 
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; align-items: center; 
        }

        /* --- 大廳核心區 --- */
        .hero-section { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            width: 100%; max-width: 720px; padding: 0 25px; animation: fadeIn 0.8s ease-out; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 呼吸發光太極蓮花圖騰 */
        .taichi-logo { 
            width: 130px; height: 130px; border-radius: 50%; 
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.4)); 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 15px 45px rgba(203, 163, 122, 0.15), inset 0 0 20px rgba(203, 163, 122, 0.05); 
            display: flex; justify-content: center; align-items: center; position: relative; 
            margin-bottom: 35px; animation: floatLogo 4s infinite ease-in-out; 
        }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); box-shadow: 0 15px 45px rgba(203, 163, 122, 0.15); } 50% { transform: translateY(-10px); box-shadow: 0 25px 55px rgba(203, 163, 122, 0.25); } }
        
        .taichi-logo::after { 
            content: ''; position: absolute; width: 80px; height: 80px; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 90 C 110 70, 100 20, 70 45 C 60 50, 50 65, 50 90' stroke='%23CBA37A' fill='none' stroke-width='1.5'/%3E%3Cpath d='M50 90 C -10 70, 0 20, 30 45 C 40 50, 50 65, 50 90' stroke='%23CBA37A' fill='none' stroke-width='1.5'/%3E%3Cpath d='M50 85 C 80 50, 70 10, 55 30 C 52 40, 50 55, 50 85' stroke='%2382968C' fill='none' stroke-width='2'/%3E%3Cpath d='M50 85 C 20 50, 30 10, 45 30 C 48 40, 50 55, 50 85' stroke='%2382968C' fill='none' stroke-width='2'/%3E%3Cpath d='M50 85 C 65 45, 60 5, 50 20 C 40 5, 35 45, 50 85' stroke='%23CFA4A4' fill='none' stroke-width='2.5'/%3E%3C/svg%3E"); 
            background-size: contain; background-repeat: no-repeat; background-position: center; opacity: 0.9; 
        }

        .sys-title { font-size: 2rem; font-weight: 300; letter-spacing: 5px; color: var(--text-main); margin-bottom: 12px; }
        .sys-subtitle { font-size: 0.95rem; color: var(--text-light); letter-spacing: 2px; font-weight: 300; margin-bottom: 40px; text-align: center; line-height: 1.6; }

        /* --- 學習模組傳送門 --- */
        .portal-container { width: 100%; display: flex; flex-direction: column; gap: 20px; }
        
        .portal-btn { 
            width: 100%; text-decoration: none;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); border-radius: 24px; 
            padding: 25px 25px; display: flex; align-items: center; gap: 20px; 
            cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; 
        }
        .portal-btn::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.8), transparent); opacity: 0; transition: opacity 0.3s; }
        .portal-btn:active { transform: scale(0.97); }
        .portal-btn:active::before { opacity: 1; }

        .portal-icon-box { 
            width: 50px; height: 50px; border-radius: 16px; display: flex; justify-content: center; align-items: center; 
            background: rgba(255,255,255,0.8); box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .portal-icon { width: 24px; height: 24px; fill: none; stroke-width: 1.5; stroke: currentColor; }
        
        .portal-text-group { display: flex; flex-direction: column; gap: 6px; }
        .portal-name { font-size: 1.15rem; font-weight: 500; letter-spacing: 2px; color: var(--text-main); }
        .portal-desc { font-size: 0.85rem; color: var(--text-light); letter-spacing: 1px; }

        /* 專屬高亮色 */
        .btn-exam .portal-icon-box { color: var(--accent-jade); border: 1px solid rgba(130, 150, 140, 0.2); }
        .btn-exam:hover { border-color: var(--accent-jade); box-shadow: 0 8px 25px rgba(130, 150, 140, 0.15); }
        
        .btn-game .portal-icon-box { color: var(--accent-gold); border: 1px solid rgba(203, 163, 122, 0.2); }
        .btn-game:hover { border-color: var(--accent-gold); box-shadow: 0 8px 25px rgba(203, 163, 122, 0.15); }

        /* --- 底部靜默連結 --- */
        .footer-link { margin-top: auto; padding-bottom: max(30px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .footer-text { font-size: 0.8rem; color: var(--text-light); letter-spacing: 3px; text-decoration: none; transition: color 0.3s; }
        .footer-text:hover { color: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="taichi-logo"></div>
        <div class="sys-title">般若學習系統</div>
        <div class="sys-subtitle">清淨無礙的語言法界<br>為心靈尋找安定的依歸</div>

        <div class="portal-container">
            <a href="exam.html" class="portal-btn btn-exam">
                <div class="portal-icon-box">
                    <svg class="portal-icon" viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <div class="portal-text-group">
                    <div class="portal-name">全真模擬考場</div>
                    <div class="portal-desc">客觀檢視，沉穩應戰</div>
                </div>
            </a>

            <a href="game.html" class="portal-btn btn-game">
                <div class="portal-icon-box">
                    <svg class="portal-icon" viewBox="0 0 24 24">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>
                <div class="portal-text-group">
                    <div class="portal-name">化生單字測驗</div>
                    <div class="portal-desc">凝聚光芒，飛躍成長</div>
                </div>
            </a>
        </div>
    </div>

    <div class="footer-link">
        <a href="https://namoamitabhapureland.github.io/bodhicitta/index.html" target="_blank" class="footer-text">前往彌陀淨土系統</a>
    </div>

</body>
</html>
